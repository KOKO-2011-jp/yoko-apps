<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oura</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #1a1a1a;
  --ink2: #6b6b6b;
  --ink3: #b0b0b0;
  --paper: #f7f5f2;
  --line: #e4e1dc;
  --red: #c0392b;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Geist Mono', monospace;
  min-height: 100vh;
}

/* --- Setup screen --- */
#setup {
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 100vh;
  max-width: 400px;
  margin: 0 auto;
  padding: 0 32px;
}

.setup-title {
  font-family: 'Instrument Serif', serif;
  font-size: 2.6rem;
  line-height: 1.1;
  margin-bottom: 6px;
}

.setup-sub {
  font-size: 0.7rem;
  color: var(--ink2);
  line-height: 1.7;
  margin-bottom: 44px;
  letter-spacing: 0.02em;
}

.field-label {
  font-size: 0.6rem;
  color: var(--ink3);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.token-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--line);
  padding: 10px 0;
  font-family: 'Geist Mono', monospace;
  font-size: 0.8rem;
  color: var(--ink);
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 10px;
}
.token-input:focus { border-bottom-color: var(--ink); }

.hint {
  font-size: 0.63rem;
  color: var(--ink3);
  line-height: 1.6;
  margin-bottom: 28px;
}
.hint a { color: var(--ink2); text-decoration: underline; text-underline-offset: 2px; }

.btn-main {
  background: var(--ink);
  color: var(--paper);
  border: none;
  padding: 12px 24px;
  font-family: 'Geist Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: opacity 0.15s;
  align-self: flex-start;
}
.btn-main:hover { opacity: 0.7; }

.err {
  display: none;
  font-size: 0.7rem;
  color: var(--red);
  margin-top: 14px;
  line-height: 1.5;
}

/* --- Loading --- */
#loading {
  display: none;
  align-items: center;
  justify-content: center;
  position: fixed;
  inset: 0;
  background: var(--paper);
  font-size: 0.7rem;
  color: var(--ink3);
  letter-spacing: 0.1em;
}

/* --- Dashboard --- */
#dash { display: none; }

.page {
  max-width: 760px;
  margin: 0 auto;
  padding: 52px 32px 88px;
}

/* Top bar */
.topbar {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  border-bottom: 1px solid var(--line);
  padding-bottom: 18px;
  margin-bottom: 52px;
  flex-wrap: wrap;
  gap: 12px;
}

.topbar-title {
  font-family: 'Instrument Serif', serif;
  font-size: 1.05rem;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}

.date-pair {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.63rem;
  color: var(--ink2);
}

.date-input {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  font-family: 'Geist Mono', monospace;
  font-size: 0.63rem;
  color: var(--ink2);
  padding: 2px 0;
  outline: none;
  width: 94px;
}
.date-input:focus { border-bottom-color: var(--ink); color: var(--ink); }

.btn-link {
  background: none; border: none;
  font-family: 'Geist Mono', monospace;
  font-size: 0.63rem;
  color: var(--ink3);
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 2px;
  padding: 0;
}
.btn-link:hover { color: var(--ink); }

/* Section label */
.slabel {
  font-size: 0.58rem;
  color: var(--ink3);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  margin-bottom: 22px;
}

/* Scores */
.scores {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  margin-bottom: 0;
}

.score-col {
  padding-left: 20px;
  border-left: 1px solid var(--line);
}
.score-col:first-child { padding-left: 0; border-left: none; }

.sc-label {
  font-size: 0.58rem;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

.sc-num {
  font-family: 'Instrument Serif', serif;
  font-size: 3rem;
  line-height: 1;
  color: var(--ink);
  margin-bottom: 4px;
}
.sc-num.mid { color: #9a6700; }
.sc-num.low { color: var(--red); }

.sc-note {
  font-size: 0.63rem;
  color: var(--ink2);
}

/* Stages */
.stages {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-top: 1px solid var(--line);
  margin-top: 28px;
  padding-top: 22px;
  margin-bottom: 56px;
}

.stage-val {
  font-family: 'Instrument Serif', serif;
  font-size: 1.55rem;
  color: var(--ink);
  margin-bottom: 3px;
}

.stage-lbl {
  font-size: 0.57rem;
  color: var(--ink3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* Charts */
.charts {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 36px 40px;
  margin-bottom: 56px;
}

.chart-name {
  font-size: 0.58rem;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.chart-wrap { height: 76px; }

svg.lc { width: 100%; height: 100%; overflow: visible; }

/* Table */
.divider { height: 1px; background: var(--line); margin-bottom: 28px; }

.dtable {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.7rem;
}

.dtable th {
  text-align: left;
  font-size: 0.56rem;
  color: var(--ink3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-weight: 400;
  padding: 0 8px 10px 0;
  border-bottom: 1px solid var(--line);
}

.dtable td {
  padding: 9px 8px 9px 0;
  border-bottom: 1px solid var(--line);
  color: var(--ink2);
}
.dtable td:first-child { color: var(--ink); }
.dtable tr:last-child td { border-bottom: none; }

.hi { color: var(--ink) !important; }
.mi { color: #9a6700 !important; }
.lo { color: var(--red) !important; }

@media (max-width: 540px) {
  .scores { grid-template-columns: 1fr 1fr; gap: 28px 0; }
  .score-col { border-left: none; padding-left: 0; }
  .stages { grid-template-columns: 1fr 1fr; gap: 18px; }
  .charts { grid-template-columns: 1fr; }
  .sc-num { font-size: 2.4rem; }
}
</style>
</head>
<body>

<div id="setup">
  <div class="setup-title">Oura<br><em>Ring</em></div>
  <p class="setup-sub">Personal Access Token を入力して<br>データに接続します。</p>
  <div class="field-label">Personal Access Token</div>
  <input type="password" class="token-input" id="tok" placeholder="oura_xxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">
  <p class="hint"><a href="https://cloud.ouraring.com/personal-access-tokens" target="_blank">cloud.ouraring.com</a> でトークンを発行できます。</p>
  <button class="btn-main" onclick="connect()">接続する</button>
  <div class="err" id="err"></div>
</div>

<div id="loading">読み込み中…</div>

<div id="dash">
<div class="page">

  <div class="topbar">
    <span class="topbar-title">Oura <em>Ring</em></span>
    <div class="topbar-right">
      <div class="date-pair">
        <input type="date" class="date-input" id="df">
        <span style="color:var(--ink3)">—</span>
        <input type="date" class="date-input" id="dt">
        <button class="btn-link" onclick="loadAll()">更新</button>
      </div>
      <button class="btn-link" onclick="logout()">切断</button>
    </div>
  </div>

  <div class="slabel">最新スコア</div>
  <div class="scores">
    <div class="score-col">
      <div class="sc-label">睡眠</div>
      <div class="sc-num" id="s-sl">—</div>
      <div class="sc-note" id="n-sl"></div>
    </div>
    <div class="score-col">
      <div class="sc-label">アクティビティ</div>
      <div class="sc-num" id="s-ac">—</div>
      <div class="sc-note" id="n-ac"></div>
    </div>
    <div class="score-col">
      <div class="sc-label">レディネス</div>
      <div class="sc-num" id="s-rd">—</div>
      <div class="sc-note" id="n-rd"></div>
    </div>
    <div class="score-col">
      <div class="sc-label">HRV</div>
      <div class="sc-num" id="s-hv">—</div>
      <div class="sc-note">ms</div>
    </div>
  </div>

  <div class="stages">
    <div><div class="stage-val" id="st-tot">—</div><div class="stage-lbl">合計睡眠</div></div>
    <div><div class="stage-val" id="st-dp">—</div><div class="stage-lbl">深い眠り</div></div>
    <div><div class="stage-val" id="st-rm">—</div><div class="stage-lbl">REM</div></div>
    <div><div class="stage-val" id="st-lt">—</div><div class="stage-lbl">浅い眠り</div></div>
  </div>

  <div class="slabel">トレンド</div>
  <div class="charts">
    <div><div class="chart-name">睡眠スコア</div><div class="chart-wrap"><svg class="lc" id="c-sl"></svg></div></div>
    <div><div class="chart-name">レディネス</div><div class="chart-wrap"><svg class="lc" id="c-rd"></svg></div></div>
    <div><div class="chart-name">アクティビティ</div><div class="chart-wrap"><svg class="lc" id="c-ac"></svg></div></div>
    <div><div class="chart-name">HRV</div><div class="chart-wrap"><svg class="lc" id="c-hv"></svg></div></div>
  </div>

  <div class="divider"></div>
  <div class="slabel">一覧</div>
  <table class="dtable">
    <thead>
      <tr>
        <th>日付</th><th>睡眠</th><th>睡眠時間</th><th>深い眠り</th>
        <th>活動</th><th>歩数</th><th>準備度</th><th>HRV</th><th>最低心拍</th>
      </tr>
    </thead>
    <tbody id="tbl"></tbody>
  </table>

</div>
</div>

<script>
let T = '';
const fmtD = d => d.toISOString().split('T')[0];
const hm = s => { const h=Math.floor(s/3600),m=Math.floor((s%3600)/60); return `${h}h${m}m`; };
const cls = v => v>=85?'hi':v>=70?'mi':'lo';

// Init dates
(()=>{
  const to=new Date(), fr=new Date();
  fr.setDate(fr.getDate()-13);
  document.getElementById('df').value=fmtD(fr);
  document.getElementById('dt').value=fmtD(to);
})();

async function apiFetch(ep, p) {
  const u=new URL(`https://api.ouraring.com/v2/usercollection/${ep}`);
  Object.entries(p).forEach(([k,v])=>u.searchParams.set(k,v));
  const r=await fetch(u,{headers:{Authorization:`Bearer ${T}`}});
  if(r.status===401) throw new Error('トークンが無効です。');
  if(!r.ok) throw new Error(`APIエラー (${r.status})`);
  return r.json();
}

function showErr(m){ const e=document.getElementById('err'); e.textContent=m; e.style.display='block'; }

async function connect() {
  const t=document.getElementById('tok').value.trim();
  if(!t){ showErr('トークンを入力してください。'); return; }
  T=t;
  await loadAll();
}

function logout() {
  T='';
  document.getElementById('dash').style.display='none';
  document.getElementById('setup').style.display='flex';
}

async function loadAll() {
  document.getElementById('err').style.display='none';
  document.getElementById('setup').style.display='none';
  document.getElementById('loading').style.display='flex';
  document.getElementById('dash').style.display='none';

  const fr=document.getElementById('df').value, to=document.getElementById('dt').value;

  try {
    const [sl,ac,rd,se]=await Promise.all([
      apiFetch('daily_sleep',     {start_date:fr,end_date:to}),
      apiFetch('daily_activity',  {start_date:fr,end_date:to}),
      apiFetch('daily_readiness', {start_date:fr,end_date:to}),
      apiFetch('sleep',           {start_date:fr,end_date:to}),
    ]);
    document.getElementById('loading').style.display='none';
    document.getElementById('dash').style.display='block';
    render(sl.data||[], ac.data||[], rd.data||[], se.data||[]);
  } catch(e) {
    document.getElementById('loading').style.display='none';
    document.getElementById('setup').style.display='flex';
    showErr(e.message);
  }
}

function setSc(nid, did, val, note) {
  const el=document.getElementById(nid);
  el.textContent=val??'—';
  el.className='sc-num'+(val!=null?' '+cls(val):'');
  if(did) document.getElementById(did).textContent=note||'';
}

function render(sleeps, acts, rdns, sess) {
  const srt=(a,b)=>a.day<b.day?-1:1;
  sleeps.sort(srt); acts.sort(srt); rdns.sort(srt);

  const lS=sleeps.at(-1), lA=acts.at(-1), lR=rdns.at(-1);
  setSc('s-sl','n-sl',lS?.score,lS?.day);
  setSc('s-ac','n-ac',lA?.score,lA?.steps!=null?lA.steps.toLocaleString('ja')+'歩':'');
  setSc('s-rd','n-rd',lR?.score,lR?.day);

  const hvSess=sess.filter(s=>s.average_hrv!=null).sort(srt);
  const lH=hvSess.at(-1);
  if(lH){ const el=document.getElementById('s-hv'); el.textContent=Math.round(lH.average_hrv); el.className='sc-num'; }

  const ms=sess.filter(s=>s.type==='long_sleep').at(-1)||sess.at(-1);
  if(ms){
    document.getElementById('st-tot').textContent=ms.total_sleep_duration!=null?hm(ms.total_sleep_duration):'—';
    document.getElementById('st-dp').textContent=ms.deep_sleep_duration!=null?hm(ms.deep_sleep_duration):'—';
    document.getElementById('st-rm').textContent=ms.rem_sleep_duration!=null?hm(ms.rem_sleep_duration):'—';
    document.getElementById('st-lt').textContent=ms.light_sleep_duration!=null?hm(ms.light_sleep_duration):'—';
  }

  drawChart('c-sl',sleeps.map(s=>s.day),sleeps.map(s=>s.score),'#1a1a1a',0,100);
  drawChart('c-rd',rdns.map(r=>r.day),rdns.map(r=>r.score),'#1a1a1a',0,100);
  drawChart('c-ac',acts.map(a=>a.day),acts.map(a=>a.score),'#1a1a1a',0,100);
  drawChart('c-hv',hvSess.map(s=>s.day?.slice(0,10)||''),hvSess.map(s=>Math.round(s.average_hrv)),'#c0392b',null,null);

  // Table
  const days=[...new Set([...sleeps.map(s=>s.day),...acts.map(a=>a.day),...rdns.map(r=>r.day)])].sort().reverse();
  const SM=Object.fromEntries(sleeps.map(s=>[s.day,s]));
  const AM=Object.fromEntries(acts.map(a=>[a.day,a]));
  const RM=Object.fromEntries(rdns.map(r=>[r.day,r]));
  const seM={};
  sess.forEach(s=>{ const d=s.day?.slice(0,10)||''; (seM[d]||(seM[d]=[])).push(s); });

  document.getElementById('tbl').innerHTML=days.map(d=>{
    const s=SM[d],a=AM[d],r=RM[d];
    const ss=seM[d]||[];
    const m=ss.find(x=>x.type==='long_sleep')||ss[0];
    const sc=v=>v!=null?`class="${cls(v)}"`:'';
    return `<tr>
      <td>${d}</td>
      <td ${sc(s?.score)}>${s?.score??'—'}</td>
      <td>${m?.total_sleep_duration!=null?hm(m.total_sleep_duration):'—'}</td>
      <td>${m?.deep_sleep_duration!=null?hm(m.deep_sleep_duration):'—'}</td>
      <td ${sc(a?.score)}>${a?.score??'—'}</td>
      <td>${a?.steps!=null?a.steps.toLocaleString('ja'):'—'}</td>
      <td ${sc(r?.score)}>${r?.score??'—'}</td>
      <td>${m?.average_hrv?Math.round(m.average_hrv)+'ms':'—'}</td>
      <td>${m?.lowest_heart_rate?m.lowest_heart_rate+'bpm':'—'}</td>
    </tr>`;
  }).join('');
}

function drawChart(id, labels, values, color, yMin, yMax) {
  const svg=document.getElementById(id);
  const W=svg.closest('.chart-wrap').offsetWidth||300;
  const H=76;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  if(!values.length||values.every(v=>v==null)){svg.innerHTML='';return;}

  const nums=values.filter(v=>v!=null);
  const lo=yMin!=null?yMin:Math.min(...nums)*0.93;
  const hi=yMax!=null?yMax:Math.max(...nums)*1.07;
  const rng=hi-lo||1;
  const pL=2,pR=2,pT=14,pB=16;
  const w=W-pL-pR, h=H-pT-pB;
  const n=values.length;
  const px=i=>pL+(i/(n-1||1))*w;
  const py=v=>pT+h-((v-lo)/rng)*h;

  const pts=values.map((v,i)=>`${px(i)},${py(v??lo)}`).join(' ');
  const fill=[`${pL},${pT+h}`,...values.map((v,i)=>`${px(i)},${py(v??lo)}`),`${pL+w},${pT+h}`].join(' ');
  const lv=values.at(-1)??lo, lx=px(n-1), ly=py(lv);

  svg.innerHTML=`
    <polygon points="${fill}" fill="${color}" opacity="0.06"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${lx}" cy="${ly}" r="2.8" fill="${color}"/>
    <text x="${lx}" y="${ly-7}" text-anchor="middle" font-family="Geist Mono,monospace" font-size="8" fill="${color}">${lv}</text>
    <text x="${pL}" y="${H-1}" font-family="Geist Mono,monospace" font-size="7" fill="#b0b0b0">${labels[0]?.slice(5)||''}</text>
    <text x="${pL+w}" y="${H-1}" text-anchor="end" font-family="Geist Mono,monospace" font-size="7" fill="#b0b0b0">${labels.at(-1)?.slice(5)||''}</text>
    <line x1="${pL}" y1="${pT+h}" x2="${pL+w}" y2="${pT+h}" stroke="#e4e1dc" stroke-width="1"/>
  `;
}
</script>
</body>
</html>
