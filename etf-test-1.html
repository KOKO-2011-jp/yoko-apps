<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投信APIテスト</title>
<style>
  body { background:#0a0a0f; color:#f0f0f0; font-family:sans-serif; padding:20px; font-size:14px; }
  .box { background:#111; border:1px solid #333; border-radius:12px; padding:16px; margin:10px 0; }
  .ok { color:#4ade80; } .err { color:#f87171; } .warn { color:#fbbf24; }
  button { background:#4f46e5; color:#fff; border:none; padding:12px 24px; border-radius:8px; font-size:15px; width:100%; margin-top:10px; }
  pre { font-size:11px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
</style>
</head>
<body>
<h2>🔍 投信APIテスト v2</h2>
<button onclick="runTest()">▶ テスト開始</button>
<div id="results"></div>
<script>
const TARGET = 'https://developer.am.mufg.jp/fund_information_latest/association_fund_cd/04314208';
const PROXIES = [
  { name: 'allorigins', fn: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  { name: 'proxy.cors.sh', fn: u => `https://proxy.cors.sh/${u}` },
  { name: 'cors-anywhere', fn: u => `https://cors-anywhere.herokuapp.com/${u}` },
  { name: 'yacdn', fn: u => `https://yacdn.org/proxy/${u}` },
];
async function runTest() {
  const div = document.getElementById('results');
  div.innerHTML = '<div class="box warn">⏳ テスト中...</div>';
  let html = '';
  for (const p of PROXIES) {
    html += `<div class="box"><b>${p.name}</b><br>`;
    try {
      const res = await fetch(p.fn(TARGET), { signal: AbortSignal.timeout(10000), headers:{'X-Requested-With':'XMLHttpRequest'} });
      const text = await res.text();
      if (!res.ok) {
        html += `<span class="err">❌ HTTP ${res.status}</span><pre>${text.slice(0,150)}</pre>`;
      } else {
        try {
          const data = JSON.parse(text);
          const nav = data?.datasets?.[0]?.value?.[0]?.nav ?? '(NAVなし)';
          html += `<span class="ok">✅ 成功！ NAV=${nav}</span><pre>${text.slice(0,200)}</pre>`;
        } catch(e) {
          html += `<span class="warn">⚠ JSONパース失敗</span><pre>${text.slice(0,200)}</pre>`;
        }
      }
    } catch(e) {
      html += `<span class="err">❌ ${e.message}</span>`;
    }
    html += '</div>';
    div.innerHTML = html + '<div class="box warn">⏳ 続行中...</div>';
  }
  div.innerHTML = html;
}
</script>
</body>
</html>
