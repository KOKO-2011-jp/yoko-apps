<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshLog — 食事記録</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f7e8;
    --white: #fffef8;
    --green: #3a8c3f;
    --green2: #6dbf6a;
    --green-pale: #d4edcc;
    --green-border: rgba(58,140,63,0.18);
    --orange: #e8762a;
    --yellow: #c8a020;
    --purple: #7c4fa0;
    --text: #2a3820;
    --muted: #7aaa68;
    --shadow: 0 4px 20px rgba(58,140,63,0.12);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; top:-80px; right:-60px;
    width:300px; height:300px;
    background: radial-gradient(circle, rgba(109,191,106,0.25) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }
  body::after {
    content:''; position:fixed; bottom:-60px; left:-60px;
    width:250px; height:250px;
    background: radial-gradient(circle, rgba(232,118,42,0.15) 0%, transparent 70%);
    pointer-events:none; z-index:0;
  }

  .container { max-width:480px; margin:0 auto; padding:0 14px 80px; position:relative; z-index:1; }

  /* Header */
  header {
    background: var(--green);
    margin: 0 -14px;
    padding: 22px 28px 36px;
    position: relative;
    overflow: hidden;
    margin-bottom: 0;
  }
  header::before {
    content: '🥦🍋🍅🥕🥑🥬🍊🍇';
    position: absolute; top:6px; right:-10px;
    font-size:24px; letter-spacing:3px;
    opacity:0.2; transform:rotate(-5deg);
  }
  .logo { font-size:30px; font-weight:900; color:#fff; text-shadow:1px 2px 0 rgba(0,0,0,0.15); }
  .logo span { color:#fde68a; }
  .tagline { font-size:12px; color:rgba(255,255,255,0.7); margin-top:3px; }
  .date-badge {
    display:inline-block; background:rgba(255,255,255,0.2);
    border-radius:20px; padding:4px 12px; font-size:11px; color:#fff; margin-top:8px;
  }

  /* Cal card */
  .cal-card {
    background: var(--white);
    border-radius:22px; padding:18px;
    margin-top:-18px;
    box-shadow: 0 8px 28px rgba(58,140,63,0.16);
    display:flex; align-items:center; gap:16px;
    margin-bottom:12px;
  }
  .ring-wrap { position:relative; width:90px; height:90px; flex-shrink:0; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-center {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  .ring-emoji { font-size:16px; }
  .ring-kcal { font-size:15px; font-weight:900; color:var(--green); line-height:1; }
  .ring-label { font-size:8px; color:var(--muted); }
  .cal-info { flex:1; }
  .cal-sub { font-size:11px; color:var(--muted); }
  .cal-remain { font-size:32px; font-weight:900; color:var(--text); line-height:1; }
  .cal-unit { font-size:13px; color:var(--muted); }
  .cal-bar { height:7px; background:var(--green-pale); border-radius:4px; overflow:hidden; margin-top:8px; }
  .cal-bar-fill { height:100%; background:linear-gradient(90deg,var(--green2),var(--green)); border-radius:4px; transition:width 0.6s ease; }
  .cal-bar-label { font-size:10px; color:var(--muted); margin-top:3px; }

  /* PFC */
  .pfc-row { display:flex; gap:8px; margin-bottom:12px; }
  .pfc-card {
    background:var(--white); border-radius:16px; padding:12px 8px;
    box-shadow:var(--shadow); text-align:center; flex:1;
    position:relative; overflow:hidden;
  }
  .pfc-card::before { content:attr(data-e); position:absolute; font-size:30px; bottom:-4px; right:-4px; opacity:0.13; }
  .pfc-card.P { border-top:3px solid var(--orange); }
  .pfc-card.F { border-top:3px solid var(--yellow); }
  .pfc-card.C { border-top:3px solid var(--purple); }
  .pfc-label { font-size:9px; letter-spacing:0.08em; text-transform:uppercase; font-weight:700; margin-bottom:3px; }
  .pfc-card.P .pfc-label { color:var(--orange); }
  .pfc-card.F .pfc-label { color:var(--yellow); }
  .pfc-card.C .pfc-label { color:var(--purple); }
  .pfc-val { font-size:19px; font-weight:900; color:var(--text); }
  .pfc-g { font-size:9px; color:var(--muted); }
  .pfc-bar { height:4px; border-radius:2px; margin-top:5px; overflow:hidden; }
  .pfc-card.P .pfc-bar { background:#fde8cc; }
  .pfc-card.F .pfc-bar { background:#fdf4cc; }
  .pfc-card.C .pfc-bar { background:#ead8f5; }
  .pfc-bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; }
  .pfc-card.P .pfc-bar-fill { background:var(--orange); }
  .pfc-card.F .pfc-bar-fill { background:var(--yellow); }
  .pfc-card.C .pfc-bar-fill { background:var(--purple); }

  /* Input section */
  .input-section {
    background:var(--white); border:1.5px solid var(--green-border);
    border-radius:20px; padding:18px;
    margin-bottom:12px; box-shadow:var(--shadow);
  }
  .section-title { font-size:11px; letter-spacing:0.12em; color:var(--muted); font-weight:700; text-transform:uppercase; margin-bottom:12px; }
  .input-field {
    width:100%; background:#f5faf0; border:1.5px solid var(--green-border);
    border-radius:11px; padding:11px 13px; color:var(--text);
    font-family:'Noto Sans JP',sans-serif; font-size:14px; outline:none;
    transition:border-color 0.2s; margin-bottom:8px;
  }
  .input-field:focus { border-color:var(--green); }
  .input-field::placeholder { color:#b0cca8; }
  .btn-row { display:flex; gap:8px; margin-top:4px; }
  .btn-add {
    flex:1; background:linear-gradient(90deg,var(--green),var(--green2));
    border:none; border-radius:11px; color:#fff;
    font-family:'Noto Sans JP',sans-serif; font-size:15px; font-weight:700;
    padding:13px; cursor:pointer;
    box-shadow:0 4px 14px rgba(58,140,63,0.28);
    transition:opacity 0.2s, transform 0.1s;
  }
  .btn-add:hover { opacity:0.9; transform:translateY(-1px); }
  .btn-add:active { transform:translateY(0); }
  .btn-voice {
    width:52px; background:#f5faf0; border:1.5px solid var(--green-border);
    border-radius:11px; font-size:20px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background 0.2s, border-color 0.2s;
  }
  .btn-voice:hover { background:var(--green-pale); border-color:var(--green); }
  .btn-voice.recording {
    background:#fde0dc; border-color:#e05555;
    animation:pulse 1s infinite;
  }
  @keyframes pulse {
    0%,100% { transform:scale(1); box-shadow:0 0 0 0 rgba(224,85,85,0.4); }
    50% { transform:scale(1.07); box-shadow:0 0 0 8px rgba(224,85,85,0); }
  }
  .voice-hint { font-size:11px; color:var(--muted); text-align:center; margin-top:8px; min-height:16px; }
  .voice-hint.active { color:#e05555; font-weight:700; }

  /* Log */
  .log-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .log-title { font-size:11px; letter-spacing:0.12em; color:var(--muted); font-weight:700; text-transform:uppercase; }
  .btn-clear { font-size:11px; color:var(--muted); background:none; border:none; cursor:pointer; padding:4px 8px; border-radius:8px; }
  .btn-clear:hover { color:var(--green); background:var(--green-pale); }
  .log-list { display:flex; flex-direction:column; gap:8px; }
  .log-item {
    background:var(--white); border:1.5px solid var(--green-border);
    border-radius:15px; padding:12px 14px;
    display:flex; align-items:center; gap:10px;
    box-shadow:var(--shadow); animation:slideIn 0.2s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .log-emoji { font-size:22px; flex-shrink:0; }
  .log-info { flex:1; min-width:0; }
  .log-name { font-size:13px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .log-pfc { font-size:10px; color:var(--muted); margin-top:2px; }
  .log-right { text-align:right; flex-shrink:0; }
  .log-kcal { font-size:15px; font-weight:900; color:var(--green); }
  .log-time { font-size:9px; color:var(--muted); }
  .btn-del { background:none; border:none; font-size:14px; color:#ccc; cursor:pointer; margin-left:6px; transition:color 0.2s; }
  .btn-del:hover { color:#e05555; }
  .empty { text-align:center; padding:32px 0; color:var(--muted); font-size:13px; line-height:2; }
  .empty-icon { font-size:40px; display:block; margin-bottom:8px; }
  .btn-edit { background:none; border:none; font-size:13px; color:#b8d4b0; cursor:pointer; padding:4px 5px; transition:color 0.2s; }
  .btn-edit:hover { color:var(--green); }

  /* Edit modal */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:100; align-items:center; justify-content:center; padding:20px; }
  .modal-overlay.show { display:flex; }
  .modal { background:var(--white); border-radius:22px; padding:22px; width:100%; max-width:400px; box-shadow:0 12px 40px rgba(0,0,0,0.2); animation:modalIn 0.2s ease; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  .modal-title { font-size:15px; font-weight:900; margin-bottom:16px; }
  .modal-field { margin-bottom:12px; }
  .modal-field label { font-size:10px; color:var(--muted); display:block; margin-bottom:4px; font-weight:700; text-transform:uppercase; letter-spacing:0.08em; }
  .modal-field input { width:100%; background:#f5faf0; border:1.5px solid var(--green-border); border-radius:11px; padding:10px 12px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; outline:none; box-sizing:border-box; }
  .modal-field input:focus { border-color:var(--green); }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-btns { display:flex; gap:8px; margin-top:16px; }
  .modal-save { flex:1; background:linear-gradient(90deg,var(--green),var(--green2)); border:none; border-radius:11px; color:#fff; font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; padding:12px; cursor:pointer; }
  .modal-cancel { padding:12px 18px; background:none; border:1.5px solid var(--green-border); border-radius:11px; color:var(--muted); font-family:'Noto Sans JP',sans-serif; font-size:14px; cursor:pointer; }

  /* Goal section */
  .goal-section { background:var(--white); border:1.5px solid var(--green-border); border-radius:20px; padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
  .goal-toggle { font-size:11px; color:var(--muted); background:none; border:1px solid var(--green-border); border-radius:8px; padding:2px 8px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; }
  .goal-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:12px; }
  .goal-field label { font-size:10px; color:var(--muted); display:block; margin-bottom:3px; font-weight:700; }
  .goal-field input { width:100%; background:#f5faf0; border:1.5px solid var(--green-border); border-radius:10px; padding:8px 10px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:14px; font-weight:700; outline:none; }
  .goal-field input:focus { border-color:var(--green); }
</style>
</head>
<body>

<header>
  <div class="logo">Fresh<span>Log</span></div>
  <div class="tagline">野菜・果物たっぷりの食事記録</div>
  <div class="date-badge" id="dateLabel"></div>
</header>

<div class="container">

  <!-- Calorie ring -->
  <div class="cal-card">
    <div class="ring-wrap">
      <svg width="90" height="90">
        <circle cx="45" cy="45" r="36" fill="none" stroke="#d4edcc" stroke-width="9"/>
        <circle id="calRing" cx="45" cy="45" r="36" fill="none" stroke="#3a8c3f" stroke-width="9"
          stroke-linecap="round" stroke-dasharray="226" stroke-dashoffset="226"
          style="transition:stroke-dashoffset 0.6s ease"/>
      </svg>
      <div class="ring-center">
        <div class="ring-emoji">🌿</div>
        <div class="ring-kcal" id="ringKcal">0</div>
        <div class="ring-label">kcal</div>
      </div>
    </div>
    <div class="cal-info">
      <div class="cal-sub">あと食べられる</div>
      <div><span class="cal-remain" id="remainKcal">2000</span><span class="cal-unit"> kcal</span></div>
      <div class="cal-bar"><div class="cal-bar-fill" id="calBarFill" style="width:0%"></div></div>
      <div class="cal-bar-label" id="calBarLabel">摂取 0 / 目標 2000 kcal</div>
    </div>
  </div>

  <!-- PFC -->
  <div class="pfc-row">
    <div class="pfc-card P" data-e="🍗">
      <div class="pfc-label">P タンパク質</div>
      <div class="pfc-val" id="pVal">0<span class="pfc-g">g</span></div>
      <div class="pfc-bar"><div class="pfc-bar-fill" id="pBar" style="width:0%"></div></div>
    </div>
    <div class="pfc-card F" data-e="🥑">
      <div class="pfc-label">F 脂質</div>
      <div class="pfc-val" id="fVal">0<span class="pfc-g">g</span></div>
      <div class="pfc-bar"><div class="pfc-bar-fill" id="fBar" style="width:0%"></div></div>
    </div>
    <div class="pfc-card C" data-e="🍠">
      <div class="pfc-label">C 炭水化物</div>
      <div class="pfc-val" id="cVal">0<span class="pfc-g">g</span></div>
      <div class="pfc-bar"><div class="pfc-bar-fill" id="cBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="section-title">✏️ 食事を記録</div>
    <input class="input-field" id="foodInput" type="text" placeholder="食べたもの（例：鶏むね肉200g、白米）">
    <div class="btn-row">
      <button class="btn-add" id="addBtn">🥗 AIで栄養計算して記録</button>
      <button class="btn-voice" id="voiceBtn" title="音声入力">🎤</button>
    </div>
    <div class="voice-hint" id="voiceHint">🎤 ボタンで音声入力（例：「昼に鶏むね200gとブロッコリー食べた」）</div>
  </div>

  <!-- Goals -->
  <div class="goal-section">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span class="section-title" style="margin-bottom:0">⚙️ 目標設定</span>
      <button class="goal-toggle" id="goalToggle">変更する</button>
    </div>
    <div class="goal-grid" id="goalGrid" style="display:none">
      <div class="goal-field"><label>🔥 カロリー (kcal)</label><input type="number" id="goalCal" value="2000"></div>
      <div class="goal-field"><label>🍗 タンパク質 (g)</label><input type="number" id="goalP" value="120"></div>
      <div class="goal-field"><label>🥑 脂質 (g)</label><input type="number" id="goalF" value="60"></div>
      <div class="goal-field"><label>🍠 炭水化物 (g)</label><input type="number" id="goalC" value="250"></div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-header">
    <span class="log-title">📋 今日の記録</span>
    <button class="btn-clear" id="clearBtn">全削除</button>
  </div>
  <div class="log-list" id="logList">
    <div class="empty"><span class="empty-icon">🥗</span>まだ記録がありません<br>上から食事を入力してみましょう！</div>
  </div>

</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">✏️ 記録を修正</div>
    <div class="modal-field">
      <label>食品名</label>
      <input type="text" id="editName" placeholder="食品名">
    </div>
    <div class="modal-field">
      <label>量</label>
      <input type="text" id="editAmount" placeholder="例：200g">
    </div>
    <div class="modal-grid">
      <div class="modal-field">
        <label>🔥 カロリー (kcal)</label>
        <input type="number" id="editKcal" min="0">
      </div>
      <div class="modal-field">
        <label>🍗 タンパク質 (g)</label>
        <input type="number" id="editP" min="0" step="0.1">
      </div>
      <div class="modal-field">
        <label>🥑 脂質 (g)</label>
        <input type="number" id="editF" min="0" step="0.1">
      </div>
      <div class="modal-field">
        <label>🍠 炭水化物 (g)</label>
        <input type="number" id="editC" min="0" step="0.1">
      </div>
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modalCancel">キャンセル</button>
      <button class="modal-save" id="modalSave">💾 保存する</button>
    </div>
  </div>
</div>

// ── Food DB ──

  'からあげ':{per100:{kcal:307,p:16.6,f:20.1,c:14.7}},'唐揚げ':{per100:{kcal:307,p:16.6,f:20.1,c:14.7}},
};
const EMOJI_MAP = {'白米':'🍚','ご飯':'🍚','鶏むね':'🍗','鶏もも':'🍗','鶏胸':'🍗','卵':'🥚','目玉焼き':'🍳','バナナ':'🍌','りんご':'🍎','ヨーグルト':'🥛','みそ汁':'🍵','味噌汁':'🍵','サラダ':'🥗','パン':'🍞','食パン':'🍞','豆腐':'🫘','納豆':'🫘','牛乳':'🥛','ラーメン':'🍜','カレー':'🍛','おにぎり':'🍙','ハンバーガー':'🍔','サーモン':'🐟','ツナ':'🐟','ブロッコリー':'🥦','トマト':'🍅','アボカド':'🥑','プロテイン':'💪','コーヒー':'☕','からあげ':'🍗','唐揚げ':'🍗'};
const getEmoji = n => { for(const [k,e] of Object.entries(EMOJI_MAP)) if(n.includes(k)) return e; return '🍽️'; };

// ── State ──
const TODAY = new Date().toDateString();
const GOALS_KEY = 'freshlog_goals';
let goals = { cal:2000, p:120, f:60, c:250 };
try {
  const saved = JSON.parse(localStorage.getItem(GOALS_KEY));
  if(saved) goals = saved;
} catch{}

let log = [];
try { log = JSON.parse(localStorage.getItem('freshlog_v2')||'[]').filter(i=>i.date===TODAY); } catch{}

// 目標入力欄を保存済み値で初期化
document.getElementById('goalCal').value = goals.cal;
document.getElementById('goalP').value = goals.p;
document.getElementById('goalF').value = goals.f;
document.getElementById('goalC').value = goals.c;

function saveGoals() {
  localStorage.setItem(GOALS_KEY, JSON.stringify(goals));
}

function saveLog() {
  try {
    const others = JSON.parse(localStorage.getItem('freshlog_v2')||'[]').filter(i=>i.date!==TODAY);
    localStorage.setItem('freshlog_v2', JSON.stringify([...log,...others]));
  } catch{}
}

// ── Parse local DB ──
function parseLocal(text) {
  const results = [];
  const sorted = Object.entries(FOOD_DB).sort((a,b)=>b[0].length-a[0].length);
  const matched = new Set();
  for (const [food, data] of sorted) {
    if (!text.includes(food)) continue;
    if([...matched].some(m=>m.includes(food)&&m!==food)) continue;
    matched.add(food);
    let g = data.defaultG || 100;
    let amountLabel = g+'g';
    // food名の後ろに任意の空白・助詞を許可してマッチ
    const sep = '[をのにへ　 ]*';
    const mHalf  = text.match(new RegExp(food+sep+'半分'));
    const mGram  = text.match(new RegExp(food+sep+'(\\d+(?:\\.\\d+)?)\\s*(g|グラム|ml|cc)'));
    const mCount = text.match(new RegExp(food+sep+'(\\d+)\\s*(枚|個|本|杯|切|片|人前|食|袋|缶)'));
    if(mHalf) {
      g = Math.round((data.defaultG||100)/2);
      amountLabel = '半分('+g+'g)';
    } else if(mGram) {
      g = parseFloat(mGram[1]);
      amountLabel = g+'g';
    } else if(mCount) {
      g = (data.defaultG||100) * parseInt(mCount[1]);
      amountLabel = mCount[1]+mCount[2]+'('+g+'g)';
    }
    let kcal,p,f,c;
    if(data.per1){kcal=data.per1.kcal;p=data.per1.p;f=data.per1.f;c=data.per1.c;}
    else{const r=g/100;kcal=Math.round(data.per100.kcal*r);p=Math.round(data.per100.p*r*10)/10;f=Math.round(data.per100.f*r*10)/10;c=Math.round(data.per100.c*r*10)/10;}
    results.push({name:food,amount:amountLabel,kcal,p,f,c});
  }
  return results;
}

// ── AI analyze ──
async function analyzeWithAI(text) {
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`次の食事記録から栄養素を推定してください。\n入力：「${text}」\nJSON形式のみで返してください（説明不要）：\n{"items":[{"name":"食品名","amount":"量","kcal":数値,"protein":数値,"fat":数値,"carb":数値}],"comment":"一言アドバイス（日本語40文字以内）"}`}]})
  });
  const data = await res.json();
  return JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
}

// ── Add entry ──
let _idCounter = Date.now();
function makeId() { return String(++_idCounter); }

function addEntry(name, amount, kcal, p, f, c) {
  const now = new Date();
  log.unshift({id:makeId(),name,amount,kcal:Math.round(kcal),p:parseFloat(p)||0,f:parseFloat(f)||0,c:parseFloat(c)||0,emoji:getEmoji(name),time:now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}),date:TODAY});
  saveLog(); render();
}

// ── Render ──
function render() {
  const totals = log.reduce((a,i)=>({kcal:a.kcal+i.kcal,p:a.p+i.p,f:a.f+i.f,c:a.c+i.c}),{kcal:0,p:0,f:0,c:0});
  const pct = Math.min(totals.kcal/goals.cal,1);
  const circ = 226;
  document.getElementById('calRing').style.strokeDashoffset = circ - circ*pct;
  document.getElementById('ringKcal').textContent = Math.round(totals.kcal);
  document.getElementById('remainKcal').textContent = Math.max(goals.cal-Math.round(totals.kcal),0);
  document.getElementById('calBarFill').style.width = (pct*100)+'%';
  document.getElementById('calBarLabel').textContent = `摂取 ${Math.round(totals.kcal)} / 目標 ${goals.cal} kcal`;
  document.getElementById('pVal').innerHTML = `${Math.round(totals.p*10)/10}<span class="pfc-g">g</span>`;
  document.getElementById('fVal').innerHTML = `${Math.round(totals.f*10)/10}<span class="pfc-g">g</span>`;
  document.getElementById('cVal').innerHTML = `${Math.round(totals.c*10)/10}<span class="pfc-g">g</span>`;
  document.getElementById('pBar').style.width = Math.min(totals.p/goals.p*100,100)+'%';
  document.getElementById('fBar').style.width = Math.min(totals.f/goals.f*100,100)+'%';
  document.getElementById('cBar').style.width = Math.min(totals.c/goals.c*100,100)+'%';

  const list = document.getElementById('logList');
  if(log.length===0){list.innerHTML='<div class="empty"><span class="empty-icon">🥗</span>まだ記録がありません<br>上から食事を入力してみましょう！</div>';return;}
  list.innerHTML = log.map(item=>`
    <div class="log-item">
      <div class="log-emoji">${item.emoji}</div>
      <div class="log-info">
        <div class="log-name">${item.name} <span style="font-size:10px;color:#aaa;font-weight:300">${item.amount||''}</span></div>
        <div class="log-pfc">P${item.p}g · F${item.f}g · C${item.c}g</div>
      </div>
      <div class="log-right">
        <div class="log-kcal">${item.kcal}</div>
        <div class="log-time">${item.time}</div>
      </div>
      <button class="btn-edit" data-edit="${item.id}">✎</button>
      <button class="btn-del" data-del="${item.id}">✕</button>
    </div>
  `).join('');
}

function deleteEntry(id) { log=log.filter(i=>i.id!==id); saveLog(); render(); }

// ── Event delegation for log buttons ──
document.getElementById('logList').addEventListener('click', e=>{
  const editBtn = e.target.closest('[data-edit]');
  const delBtn  = e.target.closest('[data-del]');
  if(editBtn) openEdit(editBtn.dataset.edit);
  if(delBtn)  deleteEntry(delBtn.dataset.del);
});

// ── Edit modal ──
let editingId = null;
function openEdit(id) {
  const item = log.find(i=>i.id===id);
  if(!item) return;
  editingId = id;
  document.getElementById('editName').value = item.name;
  document.getElementById('editAmount').value = item.amount||'';
  document.getElementById('editKcal').value = item.kcal;
  document.getElementById('editP').value = item.p;
  document.getElementById('editF').value = item.f;
  document.getElementById('editC').value = item.c;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  editingId = null;
}
document.getElementById('modalCancel').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===document.getElementById('modalOverlay')) closeModal(); });
document.getElementById('modalSave').addEventListener('click', ()=>{
  if(!editingId) return;
  const idx = log.findIndex(i=>i.id===editingId);
  if(idx===-1) return;
  const name = document.getElementById('editName').value.trim() || log[idx].name;
  log[idx] = {
    ...log[idx],
    name,
    amount: document.getElementById('editAmount').value.trim(),
    kcal: parseInt(document.getElementById('editKcal').value)||0,
    p: parseFloat(document.getElementById('editP').value)||0,
    f: parseFloat(document.getElementById('editF').value)||0,
    c: parseFloat(document.getElementById('editC').value)||0,
    emoji: getEmoji(name),
  };
  saveLog(); render(); closeModal();
});

// ── Add button ──
async function handleAdd() {
  const text = document.getElementById('foodInput').value.trim();
  if(!text) return;
  const btn = document.getElementById('addBtn');
  btn.textContent = '🔍 解析中...'; btn.disabled = true;

  try {
    const result = await analyzeWithAI(text);
    result.items.forEach(item=>addEntry(item.name,item.amount,item.kcal,item.protein,item.fat,item.carb));
    document.getElementById('voiceHint').textContent = '🌿 '+result.comment;
    document.getElementById('foodInput').value = '';
  } catch {
    const local = parseLocal(text);
    if(local.length>0){
      local.forEach(r=>addEntry(r.name,r.amount,r.kcal,r.p,r.f,r.c));
      document.getElementById('voiceHint').textContent = '✅ 記録しました！';
      document.getElementById('foodInput').value = '';
    } else {
      document.getElementById('voiceHint').textContent = '⚠️ 認識できませんでした。もう少し詳しく書いてみてください。';
    }
  }
  btn.textContent = '🥗 AIで栄養計算して記録'; btn.disabled = false;
}

document.getElementById('addBtn').addEventListener('click', handleAdd);
document.getElementById('foodInput').addEventListener('keydown', e=>{ if(e.key==='Enter') handleAdd(); });
document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(!log.length) return;
  if(!confirm('今日の記録をすべて削除しますか？')) return;
  log=[]; saveLog(); render();
});

// ── Goals ──
document.getElementById('goalToggle').addEventListener('click', ()=>{
  const grid = document.getElementById('goalGrid');
  const btn = document.getElementById('goalToggle');
  const hidden = grid.style.display==='none';
  grid.style.display = hidden ? 'grid' : 'none';
  btn.textContent = hidden ? '閉じる' : '変更する';
});
['goalCal','goalP','goalF','goalC'].forEach(id=>{
  document.getElementById(id).addEventListener('input', ()=>{
    goals.cal=parseInt(document.getElementById('goalCal').value)||2000;
    goals.p=parseInt(document.getElementById('goalP').value)||120;
    goals.f=parseInt(document.getElementById('goalF').value)||60;
    goals.c=parseInt(document.getElementById('goalC').value)||250;
    saveGoals();
    render();
  });
});

// ── Voice（出費メモと同じ実装） ──
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceBtn = document.getElementById('voiceBtn');
const voiceHint = document.getElementById('voiceHint');

if (SpeechRecognition) {
  const recog = new SpeechRecognition();
  recog.lang = 'ja-JP';
  recog.interimResults = false;
  let recording = false;

  voiceBtn.addEventListener('click', ()=>{ recording ? recog.stop() : recog.start(); });

  recog.onstart = ()=>{
    recording = true;
    voiceBtn.classList.add('recording');
    voiceBtn.textContent = '⏹';
    voiceHint.textContent = '🔴 聞いています... 話してください';
    voiceHint.classList.add('active');
  };
  recog.onend = ()=>{
    recording = false;
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
    voiceHint.classList.remove('active');
  };
  recog.onresult = (event)=>{
    const transcript = event.results[0][0].transcript;
    document.getElementById('foodInput').value = transcript;
    voiceHint.textContent = `✅ 「${transcript}」— ボタンを押して記録！`;
  };
  recog.onerror = (e)=>{
    voiceHint.textContent = `エラー: ${e.error}`;
    voiceHint.classList.remove('active');
  };
} else {
  voiceBtn.style.opacity = '0.4';
  voiceBtn.title = '音声入力は未対応のブラウザです';
  voiceHint.textContent = '※ Chromeブラウザで音声入力が使えます';
}

// ── Init ──
document.getElementById('dateLabel').textContent = '📅 '+new Date().toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
render();
</script>
