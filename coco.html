<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ココちゃん星占い 完全版</title>
  <style>
    :root{
      --bg:#f8f7fb;
      --card:#ffffff;
      --text:#222222;
      --muted:#666666;
      --accent1:#ff8fb1;
      --accent2:#ffb86b;
      --accent3:#8b5cf6;
      --line:#ece8f3;
      --shadow:0 10px 28px rgba(0,0,0,0.08);
      --radius:20px;
    }

    *{box-sizing:border-box;}

    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans JP",sans-serif;
      background:
        radial-gradient(circle at top left, #ffe7f0 0%, transparent 35%),
        radial-gradient(circle at top right, #efe8ff 0%, transparent 32%),
        var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:900px;
      margin:0 auto;
      padding:24px 16px 40px;
    }

    .badge{
      display:inline-block;
      background:#fff0f5;
      color:#d63384;
      padding:8px 14px;
      border-radius:999px;
      font-weight:700;
      font-size:14px;
      margin-bottom:10px;
    }

    h1{
      font-size:34px;
      margin:0 0 8px;
      line-height:1.2;
    }

    .sub{
      color:var(--muted);
      margin:0 0 20px;
      line-height:1.7;
    }

    .grid{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    @media(min-width:860px){
      .grid{
        grid-template-columns:360px 1fr;
      }
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:18px;
    }

    .card h2{
      margin:0 0 14px;
      font-size:18px;
    }

    label{
      display:block;
      font-size:13px;
      font-weight:700;
      margin-bottom:6px;
      color:#444;
    }

    input, select{
      width:100%;
      padding:12px 14px;
      border:1px solid #ddd8ea;
      border-radius:12px;
      font-size:16px;
      background:#fff;
    }

    .field{
      margin-bottom:12px;
    }

    .btn{
      width:100%;
      border:none;
      border-radius:14px;
      padding:14px 16px;
      font-size:17px;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(90deg,var(--accent1),var(--accent2));
      box-shadow:0 10px 24px rgba(255,143,177,0.28);
      margin-top:6px;
    }

    .btn-sub{
      width:100%;
      border:none;
      border-radius:14px;
      padding:12px 16px;
      font-size:15px;
      font-weight:700;
      color:#333;
      cursor:pointer;
      background:#f3f0fb;
      margin-top:10px;
    }

    .headline{
      font-size:30px;
      font-weight:900;
      margin:0 0 8px;
      line-height:1.3;
    }

    .stars{
      font-size:24px;
      color:#f59e0b;
      letter-spacing:2px;
      margin-bottom:10px;
    }

    .topline{
      color:var(--accent3);
      font-weight:800;
      margin-bottom:6px;
    }

    .date{
      color:var(--muted);
      font-weight:700;
      margin-bottom:14px;
    }

    .message{
      background:#faf9fd;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px;
      line-height:1.8;
      margin-bottom:14px;
    }

    .mini-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
    }

    @media(min-width:640px){
      .mini-grid{
        grid-template-columns:1fr 1fr;
      }
    }

    .mini{
      background:#fff;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px 14px;
      box-shadow:0 6px 18px rgba(0,0,0,0.04);
    }

    .mini .k{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      margin-bottom:6px;
    }

    .mini .v{
      font-size:16px;
      font-weight:900;
      line-height:1.5;
    }

    .back{
      text-align:center;
      margin-top:16px;
    }

    .back a{
      color:#2563eb;
      text-decoration:none;
      font-weight:800;
    }

    .note{
      font-size:12px;
      color:var(--muted);
      line-height:1.7;
      margin-top:10px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="badge">🐱 ココちゃん星占い 完全版</div>
    <h1>今日の運勢</h1>
    <p class="sub">誕生日から星座を判定して、ココちゃんが今日の運勢をお伝えします。星座ごとの個性と、日替わりの運勢を合わせた完成版です。</p>

    <div class="grid">
      <div class="card">
        <h2>入力</h2>

        <div class="field">
          <label for="birthday">誕生日</label>
          <input id="birthday" type="date">
        </div>

        <div class="field">
          <label for="mode">占いモード</label>
          <select id="mode">
            <option value="normal">ふつう</option>
            <option value="love">恋愛</option>
            <option value="work">仕事</option>
            <option value="money">お金</option>
            <option value="health">健康</option>
          </select>
        </div>

        <button class="btn" id="fortuneBtn">🐾 ココちゃん、占って！</button>
        <button class="btn-sub" id="copyBtn">📋 結果をコピー</button>

        <p class="note">
          ※これは西洋占星術の一般的な星座分類をもとにしたエンタメ版です。出生時刻・出生地を使う本格ホロスコープではありません。
        </p>
      </div>

      <div class="card">
        <div class="topline" id="signText">星座：-</div>
        <div class="headline" id="headline">準備OK？</div>
        <div class="stars" id="stars">☆☆☆☆☆</div>
        <div class="date" id="dateLabel">日付：-</div>

        <div class="message" id="message">
          まだ占いは出ていません。<br>
          左のボタンでココちゃんに聞いてみてください。
        </div>

        <div class="mini-grid">
          <div class="mini">
            <div class="k">性格タイプ</div>
            <div class="v" id="personality">-</div>
          </div>

          <div class="mini">
            <div class="k">ラッキーカラー</div>
            <div class="v" id="luckyColor">-</div>
          </div>

          <div class="mini">
            <div class="k">ラッキー曜日</div>
            <div class="v" id="luckyDay">-</div>
          </div>

          <div class="mini">
            <div class="k">エレメント</div>
            <div class="v" id="element">-</div>
          </div>

          <div class="mini">
            <div class="k">守護星</div>
            <div class="v" id="ruler">-</div>
          </div>

          <div class="mini">
            <div class="k">相性のよい星座</div>
            <div class="v" id="compatibility">-</div>
          </div>

          <div class="mini">
            <div class="k">ラッキーアイテム</div>
            <div class="v" id="luckyItem">-</div>
          </div>

          <div class="mini">
            <div class="k">ラッキーフード</div>
            <div class="v" id="luckyFood">-</div>
          </div>

          <div class="mini">
            <div class="k">今日の合言葉</div>
            <div class="v" id="keyword">-</div>
          </div>
        </div>

        <div class="back">
          <a href="./index.html">← 展示場にもどる</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function xmur3(str) {
      let h = 1779033703 ^ str.length;
      for (let i = 0; i < str.length; i++) {
        h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
        h = (h << 13) | (h >>> 19);
      }
      return function() {
        h = Math.imul(h ^ (h >>> 16), 2246822507);
        h = Math.imul(h ^ (h >>> 13), 3266489909);
        h ^= h >>> 16;
        return h >>> 0;
      };
    }

    function mulberry32(a) {
      return function() {
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function pick(rng, arr){
      return arr[Math.floor(rng() * arr.length)];
    }

    function clamp(n, min, max){
      return Math.max(min, Math.min(max, n));
    }

    const SIGNS = [
      { name:"牡羊座", start:[3,21], end:[4,19], emoji:"♈", personality:"情熱的で行動力がある", color:"赤", day:"火曜日", element:"火", ruler:"火星", compatibility:"獅子座・射手座", advice:"勢いがあるぶん、今日は深呼吸してから動くとさらに強いニャ。" },
      { name:"牡牛座", start:[4,20], end:[5,20], emoji:"♉", personality:"落ち着きがあり粘り強い", color:"緑", day:"金曜日", element:"地", ruler:"金星", compatibility:"乙女座・山羊座", advice:"自分のペースを守るほど運が育つ日ニャ。" },
      { name:"双子座", start:[5,21], end:[6,21], emoji:"♊", personality:"好奇心旺盛で会話上手", color:"黄色", day:"水曜日", element:"風", ruler:"水星", compatibility:"天秤座・水瓶座", advice:"気になったことをひとつ試すと流れが良くなるニャ。" },
      { name:"蟹座", start:[6,22], end:[7,22], emoji:"♋", personality:"優しく家庭的で思いやりがある", color:"白", day:"月曜日", element:"水", ruler:"月", compatibility:"蠍座・魚座", advice:"安心できる場所を整えると心も運気も整うニャ。" },
      { name:"獅子座", start:[7,23], end:[8,22], emoji:"♌", personality:"華やかで自信にあふれる", color:"金", day:"日曜日", element:"火", ruler:"太陽", compatibility:"牡羊座・射手座", advice:"主役力がある日。堂々と、でも優しさを忘れずにニャ。" },
      { name:"乙女座", start:[8,23], end:[9,22], emoji:"♍", personality:"丁寧で分析力が高い", color:"ベージュ", day:"水曜日", element:"地", ruler:"水星", compatibility:"牡牛座・山羊座", advice:"細やかさが武器。ひとつ整えるだけで満点に近づくニャ。" },
      { name:"天秤座", start:[9,23], end:[10,23], emoji:"♎", personality:"美意識が高くバランス感覚がある", color:"ピンク", day:"金曜日", element:"風", ruler:"金星", compatibility:"双子座・水瓶座", advice:"迷ったら『美しいほう、心地よいほう』を選ぶといいニャ。" },
      { name:"蠍座", start:[10,24], end:[11,22], emoji:"♏", personality:"集中力が高く情が深い", color:"深紅", day:"火曜日", element:"水", ruler:"冥王星・火星", compatibility:"蟹座・魚座", advice:"深く考える力が強い日。大事なことを一つ掘ると実りがあるニャ。" },
      { name:"射手座", start:[11,23], end:[12,21], emoji:"♐", personality:"自由で前向き、冒険好き", color:"紫", day:"木曜日", element:"火", ruler:"木星", compatibility:"牡羊座・獅子座", advice:"少し遠くを見ると運が広がるニャ。視野を大きくニャ。" },
      { name:"山羊座", start:[12,22], end:[1,19], emoji:"♑", personality:"まじめで責任感が強い", color:"黒", day:"土曜日", element:"地", ruler:"土星", compatibility:"牡牛座・乙女座", advice:"積み上げの力が最強。今日は小さな達成を大事にするニャ。" },
      { name:"水瓶座", start:[1,20], end:[2,18], emoji:"♒", personality:"個性的で発想がユニーク", color:"青", day:"土曜日", element:"風", ruler:"天王星・土星", compatibility:"双子座・天秤座", advice:"普通にこだわらないほど運が開く日。ひらめきを信じるニャ。" },
      { name:"魚座", start:[2,19], end:[3,20], emoji:"♓", personality:"感受性豊かでやさしい", color:"水色", day:"木曜日", element:"水", ruler:"海王星・木星", compatibility:"蟹座・蠍座", advice:"感受性が高い日。無理せず、やさしい空気を選ぶニャ。" }
    ];

    const ITEMS = ["お気に入りのペン","ハンドクリーム","ノート","イヤホン","猫の写真","リップバーム","小さな鏡","お守り","温かい靴下","折りたたみ傘"];
    const FOODS = ["ヨーグルト","お味噌汁","チョコひとかけ","ナッツ","おにぎり","フルーツ","スープ","甘酒","サラダ","紅茶"];
    const WORDS = ["ゆっくりでいい","一歩ずつ","笑顔でいこう","深呼吸","整える","あせらない","まず一つ","自分にやさしく","丁寧に","今日は軽やかに"];

    const MSG = {
      normal: [
        "今日は整えるほど運気が上がる日。",
        "大きく動くより、ひとつ決めるのが吉。",
        "気になることはメモすると運が味方するニャ。",
        "やさしい言葉が幸運を呼ぶ日。",
        "肩の力を抜くと、いい流れに乗れるニャ。"
      ],
      love: [
        "今日は自然体がいちばん魅力的。",
        "恋愛運は会話に宿る日。",
        "やさしい一言が距離を縮める日ニャ。"
      ],
      work: [
        "今日は段取りが勝負。",
        "小さく区切ると集中できる日。",
        "相談運あり。迷ったら早めに聞くと流れがよくなるニャ。"
      ],
      money: [
        "今日は衝動買いより見直しが吉。",
        "小さな節約が気持ちよく積み上がる日。",
        "お金の流れを一度見るだけでも運気アップニャ。"
      ],
      health: [
        "今日は温めると元気が戻る日。",
        "深呼吸と水分補給が味方する日。",
        "がんばりすぎ注意。休憩も実力のうちニャ。"
      ]
    };

    function getSign(month, day){
      for(const s of SIGNS){
        const [sm, sd] = s.start;
        const [em, ed] = s.end;
        if (sm < em || (sm === em && sd <= ed)) {
          if ((month === sm && day >= sd) || (month === em && day <= ed) || (month > sm && month < em)) return s;
        } else {
          if ((month === sm && day >= sd) || (month === em && day <= ed) || (month > sm || month < em)) return s;
        }
      }
      return null;
    }

    function starsFromRng(rng){
      const v = rng();
      return clamp(Math.floor(2 + v * 4), 2, 5);
    }

    function renderStars(n){
      return "★".repeat(n) + "☆".repeat(5-n);
    }

    function formatToday(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2,"0");
      const da = String(d.getDate()).padStart(2,"0");
      return { key:`${y}-${m}-${da}`, label:`${y}/${m}/${da}` };
    }

    function buildFortune(birthdayISO, mode){
      const bd = new Date(birthdayISO + "T00:00:00");
      const month = bd.getMonth() + 1;
      const day = bd.getDate();
      const sign = getSign(month, day);

      const today = formatToday();
      const seedStr = `${today.key}|${birthdayISO}|${mode}|coco-complete`;
      const seed = xmur3(seedStr)();
      const rng = mulberry32(seed);

      const stars = starsFromRng(rng);
      const baseMessage = pick(rng, MSG[mode] || MSG.normal);
      const luckyItem = pick(rng, ITEMS);
      const luckyFood = pick(rng, FOODS);
      const keyword = pick(rng, WORDS);

      const heads = [
        "今日はいい感じ！",
        "整えると強い日",
        "ゆっくり勝つ日",
        "直感が光る日",
        "小さく進む日"
      ];

      return {
        headline: pick(rng, heads),
        stars: renderStars(stars),
        message: baseMessage + " " + sign.advice,
        todayLabel: today.label,
        signText: `${sign.emoji} ${sign.name}`,
        personality: sign.personality,
        luckyColor: sign.color,
        luckyDay: sign.day,
        element: sign.element,
        ruler: sign.ruler,
        compatibility: sign.compatibility,
        luckyItem,
        luckyFood,
        keyword,
        shareText:
`🐱ココちゃん星占い
日付：${today.label}
星座：${sign.name}
性格：${sign.personality}
エレメント：${sign.element}
守護星：${sign.ruler}
相性のよい星座：${sign.compatibility}
運勢：${renderStars(stars)}
一言：${baseMessage} ${sign.advice}
ラッキーカラー：${sign.color}
ラッキー曜日：${sign.day}
ラッキーアイテム：${luckyItem}
ラッキーフード：${luckyFood}
合言葉：${keyword}`;
      };
    }

    const elHeadline = document.getElementById("headline");
    const elStars = document.getElementById("stars");
    const elSign = document.getElementById("signText");
    const elDate = document.getElementById("dateLabel");
    const elMessage = document.getElementById("message");
    const elPersonality = document.getElementById("personality");
    const elLuckyColor = document.getElementById("luckyColor");
    const elLuckyDay = document.getElementById("luckyDay");
    const elElement = document.getElementById("element");
    const elRuler = document.getElementById("ruler");
    const elCompatibility = document.getElementById("compatibility");
    const elLuckyItem = document.getElementById("luckyItem");
    const elLuckyFood = document.getElementById("luckyFood");
    const elKeyword = document.getElementById("keyword");

    let lastShareText = "";

    function showError(msg){
      elHeadline.textContent = "入力が必要ニャ";
      elStars.textContent = "☆☆☆☆☆";
      elSign.textContent = "星座：-";
      elDate.textContent = "日付：-";
      elMessage.innerHTML = msg;
      elPersonality.textContent = "-";
      elLuckyColor.textContent = "-";
      elLuckyDay.textContent = "-";
      elElement.textContent = "-";
      elRuler.textContent = "-";
      elCompatibility.textContent = "-";
      elLuckyItem.textContent = "-";
      elLuckyFood.textContent = "-";
      elKeyword.textContent = "-";
      lastShareText = "";
    }

    document.getElementById("fortuneBtn").addEventListener("click", () => {
      const b = document.getElementById("birthday").value;
      const mode = document.getElementById("mode").value;

      if(!b){
        showError("誕生日を入れてから、もう一度押してニャ🐾");
        return;
      }

      const f = buildFortune(b, mode);
      elHeadline.textContent = f.headline;
      elStars.textContent = f.stars;
      elSign.textContent = `星座：${f.signText}`;
      elDate.textContent = `日付：${f.todayLabel}`;
      elMessage.textContent = f.message;
      elPersonality.textContent = f.personality;
      elLuckyColor.textContent = f.luckyColor;
      elLuckyDay.textContent = f.luckyDay;
      elElement.textContent = f.element;
      elRuler.textContent = f.ruler;
      elCompatibility.textContent = f.compatibility;
      elLuckyItem.textContent = f.luckyItem;
      elLuckyFood.textContent = f.luckyFood;
      elKeyword.textContent = f.keyword;
      lastShareText = f.shareText;
    });

    document.getElementById("copyBtn").addEventListener("click", async () => {
      if(!lastShareText){
        alert("先に占ってからコピーしてね🐱");
        return;
      }
      try{
        await navigator.clipboard.writeText(lastShareText);
        alert("コピーしました📋");
      }catch(e){
        const ta = document.createElement("textarea");
        ta.value = lastShareText;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        alert("コピーしました📋");
      }
    });
  </script>
</body>
</html>
