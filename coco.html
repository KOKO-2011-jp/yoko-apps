<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ココちゃん星占い</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
</head>

<body>

<h1>🐱ココちゃん星占い</h1>

<p>誕生日を入力してね</p>

<input type="date" id="birthday">

<button onclick="fortune()">占う</button>

<h2 id="result"></h2>

<script>

function getSign(month,day){

const SIGNS=[
{name:"牡羊座",start:[3,21],end:[4,19]},
{name:"牡牛座",start:[4,20],end:[5,20]},
{name:"双子座",start:[5,21],end:[6,21]},
{name:"蟹座",start:[6,22],end:[7,22]},
{name:"獅子座",start:[7,23],end:[8,22]},
{name:"乙女座",start:[8,23],end:[9,22]},
{name:"天秤座",start:[9,23],end:[10,23]},
{name:"蠍座",start:[10,24],end:[11,22]},
{name:"射手座",start:[11,23],end:[12,21]},
{name:"山羊座",start:[12,22],end:[1,19]},
{name:"水瓶座",start:[1,20],end:[2,18]},
{name:"魚座",start:[2,19],end:[3,20]}
]

for(const s of SIGNS){
const [sm,sd]=s.start
const [em,ed]=s.end

if((month==sm && day>=sd)||(month==em && day<=ed)||(month>sm && month<em)){
return s.name
}

}

return "星座不明"

}

function fortune(){

const b=document.getElementById("birthday").value

if(!b){
alert("誕生日を入れてください")
return
}

const d=new Date(b)

const sign=getSign(d.getMonth()+1,d.getDate())

document.getElementById("result").innerText=

"あなたの星座は "+sign+" です🐱"

}

</script>

</body>
</html>
