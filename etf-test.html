<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投信APIテスト</title>
<style>
  body { background:#0a0a0f; color:#f0f0f0; font-family:sans-serif; padding:20px; font-size:14px; }
  .box { background:#111; border:1px solid #333; border-radius:12px; padding:16px; margin:10px 0; }
  .ok { color:#4ade80; } .err { color:#f87171; } .warn { color:#fbbf24; }
  button { background:#4f46e5; color:#fff; border:none; padding:12px 24px; border-radius:8px; font-size:15px; width:100%; margin-top:10px; }
  pre { font-size:11px; overflow-x:auto; white-space:pre-wrap; word-break:break-all; }
</style>
</head>
<body>
<h2>🔍 投信APIテスト</h2>
<p style="color:#888;font-size:12px">IFFLの基準価額取得を3つのプロキシでテストします</p>
<button onclick="runTest()">▶ テスト開始</button>
<div id="results"></div>

<script>
const TARGET_URL = 'https://developer.am.mufg.jp/fund_information_latest/association_fund_cd/04314208';
const PROXIES = [
  { name: 'corsproxy.io', fn: u => `https://corsproxy.io/?${encodeURIComponent(u)}` },
  { name: 'allorigins',   fn: u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}` },
  { name: 'thingproxy',   fn: u => `https://thingproxy.freeboard.io/fetch/${u}` },
];

async function runTest() {
  const div = document.getElementById('results');
  div.innerHTML = '<div class="box warn">⏳ テスト中...</div>';
  let html = '';

  for (const proxy of PROXIES) {
    const url = proxy.fn(TARGET_URL);
    html += `<div class="box"><b>${proxy.name}</b><br>`;
    try {
      const res = await fetch(url, { signal: AbortSignal.timeout(8000) });
      const text = await res.text();
      if (!res.ok) {
        html += `<span class="err">❌ HTTPエラー: ${res.status}</span><pre>${text.slice(0,200)}</pre>`;
      } else {
        let nav = '?';
        try {
          const data = JSON.parse(text);
          nav = data?.datasets?.[0]?.value?.[0]?.nav ?? '(NAVなし)';
          html += `<span class="ok">✅ 成功！ NAV = ${nav}</span>`;
          html += `<pre>${text.slice(0,300)}</pre>`;
        } catch(e) {
          html += `<span class="warn">⚠ JSONパース失敗</span><pre>${text.slice(0,300)}</pre>`;
        }
      }
    } catch(e) {
      html += `<span class="err">❌ 失敗: ${e.message}</span>`;
    }
    html += '</div>';
  }

  div.innerHTML = html;
}
</script>
</body>
</html>
