<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>出費メモ</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8f0fe;
    --surface: #ffffff;
    --surface2: #f0f5ff;
    --blue: #1a56db;
    --blue-dark: #0f3ab8;
    --blue-mid: #3b7df8;
    --blue-light: #93b8fc;
    --cyan: #06b6d4;
    --text: #0d1b3e;
    --muted: #6b7fa3;
    --border: rgba(26,86,219,0.13);
    --shadow: 0 4px 24px rgba(26,86,219,0.10);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -120px; left: -80px;
    width: 420px; height: 420px;
    background: radial-gradient(circle, rgba(59,125,248,0.22) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -100px; right: -80px;
    width: 350px; height: 350px;
    background: radial-gradient(circle, rgba(6,182,212,0.18) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }
  .container {
    max-width: 480px;
    margin: 0 auto;
    padding: 28px 16px 120px;
    position: relative;
    z-index: 1;
  }
  header { text-align: center; padding: 20px 0 24px; }
  header h1 {
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: -0.03em;
    color: var(--blue-dark);
  }
  header h1 span {
    color: var(--blue-mid);
    position: relative;
  }
  header h1 span::after {
    content: '';
    position: absolute;
    left: 0; bottom: -2px;
    width: 100%; height: 3px;
    background: linear-gradient(90deg, var(--blue-mid), var(--cyan));
    border-radius: 2px;
  }
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 10px;
  }
  .month-nav button {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--blue);
    font-size: 1rem;
    cursor: pointer;
    padding: 5px 13px;
    border-radius: 50px;
    font-weight: 700;
    transition: background 0.2s, color 0.2s;
    box-shadow: var(--shadow);
  }
  .month-nav button:hover { background: var(--blue); color: #fff; }
  #monthLabel {
    font-family: 'Space Mono', monospace;
    font-size: 0.88rem;
    color: var(--blue-dark);
    letter-spacing: 0.08em;
    font-weight: 700;
  }
  .total-card {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue-mid) 60%, var(--cyan) 100%);
    border-radius: 24px;
    padding: 28px 28px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(26,86,219,0.28);
  }
  .total-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.07);
    border-radius: 50%;
  }
  .total-card::after {
    content: '\00a5';
    position: absolute;
    right: 16px; bottom: -18px;
    font-size: 7rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: rgba(255,255,255,0.08);
    line-height: 1;
  }
  .total-label {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.75);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .total-amount {
    font-family: 'Space Mono', monospace;
    font-size: 3rem;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .total-count {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.65);
    margin-top: 8px;
  }
  .category-summary {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .cat-chip {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 11px 13px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    box-shadow: var(--shadow);
  }
  .cat-chip .emoji { font-size: 1.1rem; }
  .cat-chip .cat-name { color: var(--muted); flex: 1; font-size: 0.78rem; }
  .cat-chip .cat-amt {
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--blue);
    font-weight: 700;
  }
  .input-section {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
  }
  .section-title {
    font-size: 0.78rem;
    letter-spacing: 0.13em;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .input-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .input-field {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    padding: 11px 13px;
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.92rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-field:focus {
    border-color: var(--blue-mid);
    box-shadow: 0 0 0 3px rgba(59,125,248,0.12);
  }
  .input-field::placeholder { color: var(--blue-light); }
  .amount-field {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    width: 120px;
    flex: none;
  }
  .cat-select { appearance: none; cursor: pointer; }
  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .btn-add {
    flex: 1;
    background: linear-gradient(90deg, var(--blue) 0%, var(--blue-mid) 100%);
    border: none;
    border-radius: 11px;
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 16px rgba(26,86,219,0.25);
    letter-spacing: 0.05em;
  }
  .btn-add:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }
  .btn-voice {
    width: 50px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    font-size: 1.2rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .btn-voice:hover { background: var(--blue-light); border-color: var(--blue-mid); }
  .btn-voice.recording {
    background: var(--cyan);
    border-color: var(--cyan);
    animation: pulse 1s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(6,182,212,0.5); }
    50% { transform: scale(1.07); box-shadow: 0 0 0 8px rgba(6,182,212,0); }
  }
  .voice-hint {
    font-size: 0.73rem;
    color: var(--muted);
    text-align: center;
    margin-top: 8px;
    min-height: 18px;
    transition: color 0.2s;
  }
  .voice-hint.active { color: var(--cyan); font-weight: 700; }
  .btn-fixed {
    width: 100%;
    margin-top: 10px;
    background: var(--surface2);
    border: 1.5px dashed var(--blue-light);
    border-radius: 11px;
    color: var(--blue);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    padding: 12px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    letter-spacing: 0.03em;
  }
  .btn-fixed:hover { background: #dce7fd; border-color: var(--blue-mid); }
  .fixed-hint {
    font-size: 0.73rem;
    color: var(--muted);
    text-align: center;
    margin-top: 6px;
    min-height: 16px;
  }
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .list-header h2 {
    font-size: 0.78rem;
    letter-spacing: 0.13em;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
  }
  .btn-clear-all {
    font-size: 0.73rem;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 10px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
  }
  .btn-clear-all:hover { color: var(--blue); background: rgba(26,86,219,0.08); }

  .action-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    flex-wrap: wrap;
  }
  .btn-save {
    flex: 1;
    min-width: 80px;
    background: linear-gradient(90deg, #16a34a, #22c55e);
    border: none;
    border-radius: 11px;
    color: white;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 11px 6px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 12px rgba(22,163,74,0.25);
  }
  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-csv {
    flex: 1;
    min-width: 80px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 11px;
    color: var(--blue);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    padding: 11px 6px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    box-shadow: var(--shadow);
  }
  .btn-csv:hover { background: var(--surface2); border-color: var(--blue-mid); }
  .action-hint {
    font-size: 0.73rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 10px;
    min-height: 16px;
  }

  .expense-list { display: flex; flex-direction: column; gap: 8px; }
  .expense-item {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 13px 15px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: var(--shadow);
    animation: slideIn 0.22s ease;
    transition: border-color 0.2s;
  }
  .expense-item:hover { border-color: var(--blue-light); }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-7px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item-emoji {
    font-size: 1.4rem;
    width: 40px; height: 40px;
    background: var(--surface2);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .item-info { flex: 1; min-width: 0; }
  .item-name {
    font-size: 0.92rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .item-meta {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 2px;
    display: flex;
    gap: 8px;
  }
  .item-amount {
    font-family: 'Space Mono', monospace;
    font-size: 1rem;
    color: var(--blue);
    font-weight: 700;
    white-space: nowrap;
  }
  .btn-delete {
    background: none;
    border: none;
    color: var(--blue-light);
    cursor: pointer;
    font-size: 0.85rem;
    padding: 4px 6px;
    border-radius: 6px;
    transition: color 0.2s, background 0.2s;
    line-height: 1;
  }
  .btn-delete:hover { color: #fff; background: var(--blue-mid); }
  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 40px 0;
    font-size: 0.9rem;
  }
  .empty-state .big { font-size: 2.8rem; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>出費<span>メモ</span></h1>
    <div class="month-nav">
      <button id="prevMonth">&#8249;</button>
      <span id="monthLabel"></span>
      <button id="nextMonth">&#8250;</button>
    </div>
  </header>

  <div class="total-card">
    <div class="total-label">Monthly Total &nbsp;/&nbsp; 今月の合計</div>
    <div class="total-amount">&#165;<span id="totalAmount">0</span></div>
    <div class="total-count" id="totalCount">0件</div>
  </div>

  <div class="category-summary" id="catSummary"></div>

  <div class="input-section">
    <div class="section-title">&#9999;&#65039; 出費を追加</div>
    <div class="input-row">
      <input class="input-field" id="nameInput" type="text" placeholder="内容（例：コーヒー）">
      <input class="input-field amount-field" id="amountInput" type="number" placeholder="金額" min="0">
    </div>
    <div class="input-row">
      <select class="input-field cat-select" id="catInput">
        <option value="food">&#127869;&#65039; 食費</option>
        <option value="cafe">&#9749; カフェ・飲食代</option>
        <option value="transport">&#128643;&#65039; 交通費</option>
        <option value="taxi">&#128661; タクシー代</option>
        <option value="shopping">&#128717;&#65039; 買い物</option>
        <option value="leisure">&#127918; 娯楽</option>
        <option value="medical">&#128138; 医療</option>
        <option value="housing">&#127968;&#65039; 住居</option>
        <option value="other">&#127873; その他</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-add" id="addBtn">追加する</button>
      <button class="btn-voice" id="voiceBtn" title="音声入力">&#127908;</button>
    </div>
    <div class="voice-hint" id="voiceHint">&#127908; ボタンで音声入力（例：「コーヒー 350円」）</div>
    <button class="btn-fixed" id="fixedBtn">&#127968;&#65039; 今月の固定費を一括登録</button>
    <div class="fixed-hint" id="fixedHint"></div>
  </div>

  <div class="action-bar">
    <button class="btn-save" id="saveBtn">&#128190; 保存する</button>
    <button class="btn-csv" id="csvBtn">&#128229; CSVダウンロード</button>
    <button class="btn-csv" id="importBtn">&#128228; CSVインポート</button>
  </div>
  <input type="file" id="csvFileInput" accept=".csv" style="display:none">
  <div class="action-hint" id="actionHint"></div>

  <div class="list-header">
    <h2>&#128203; 履歴</h2>
    <button class="btn-clear-all" id="clearAllBtn">全削除</button>
  </div>

  <div class="expense-list" id="expenseList">
    <div class="empty-state"><div class="big">&#128153;</div>まだ記録がありません</div>
  </div>
</div>

<script>
var STORAGE_KEY = 'expense-tracker-v1';
var currentDate = new Date();
var currentYear = currentDate.getFullYear();
var currentMonth = currentDate.getMonth();

var CAT_MAP = {
  'food':      '食費',
  'cafe':      'カフェ・飲食代',
  'transport': '交通費',
  'taxi':      'タクシー代',
  'shopping':  '買い物',
  'leisure':   '娯楽',
  'medical':   '医療',
  'housing':   '住居',
  'other':     'その他'
};

var CAT_EMOJI = {
  'food':      '🍽️',
  'cafe':      '☕',
  'transport': '🚃',
  'taxi':      '🚕',
  'shopping':  '🛍️',
  'leisure':   '🎮',
  'medical':   '💊',
  'housing':   '🏠',
  'other':     '🎁'
};

var FIXED_EXPENSES = [
  { name: '住宅ローン', amount: 87130, cat: 'housing' },
  { name: '管理費',     amount: 30000, cat: 'housing' },
  { name: '実家振込',   amount: 10000, cat: 'other'   },
  { name: 'ジム',       amount: 16500, cat: 'leisure' },
  { name: 'ピアノ',     amount: 16000, cat: 'leisure' }
];

function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
}
function save(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

var allExpenses = load();

function getFiltered() {
  return allExpenses.filter(function(e) {
    var d = new Date(e.date);
    return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
  });
}

function render() {
  var expenses = getFiltered();
  var total = expenses.reduce(function(s, e) { return s + e.amount; }, 0);
  document.getElementById('totalAmount').textContent = total.toLocaleString();
  document.getElementById('totalCount').textContent = expenses.length + '件の出費';
  document.getElementById('monthLabel').textContent =
    currentYear + '年 ' + ('0' + (currentMonth + 1)).slice(-2) + '月';

  var catMap = {};
  expenses.forEach(function(e) {
    catMap[e.cat] = (catMap[e.cat] || 0) + e.amount;
  });
  var entries = Object.keys(catMap).map(function(k) {
    return [k, catMap[k]];
  }).sort(function(a, b) { return b[1] - a[1]; }).slice(0, 6);

  var catSummary = document.getElementById('catSummary');
  catSummary.innerHTML = entries.map(function(entry) {
    var k = entry[0], amt = entry[1];
    return '<div class="cat-chip">' +
      '<span class="emoji">' + (CAT_EMOJI[k] || '🎁') + '</span>' +
      '<span class="cat-name">' + (CAT_MAP[k] || k) + '</span>' +
      '<span class="cat-amt">¥' + amt.toLocaleString() + '</span>' +
      '</div>';
  }).join('');

  var list = document.getElementById('expenseList');
  if (expenses.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="big">💙</div>まだ記録がありません</div>';
    return;
  }
  var sorted = expenses.slice().reverse();
  list.innerHTML = sorted.map(function(e) {
    var emoji = CAT_EMOJI[e.cat] || '🎁';
    var d = new Date(e.date);
    var dateStr = (d.getMonth() + 1) + '/' + d.getDate() + ' ' +
      ('0' + d.getHours()).slice(-2) + ':' + ('0' + d.getMinutes()).slice(-2);
    return '<div class="expense-item">' +
      '<div class="item-emoji">' + emoji + '</div>' +
      '<div class="item-info">' +
        '<div class="item-name">' + e.name + '</div>' +
        '<div class="item-meta"><span>' + (CAT_MAP[e.cat] || e.cat) + '</span><span>' + dateStr + '</span></div>' +
      '</div>' +
      '<span class="item-amount">¥' + e.amount.toLocaleString() + '</span>' +
      '<button class="btn-delete" onclick="deleteExpense(\'' + e.id + '\')">✕</button>' +
      '</div>';
  }).join('');
}

function deleteExpense(id) {
  allExpenses = allExpenses.filter(function(e) { return e.id !== id; });
  save(allExpenses);
  render();
}

function addExpense(name, amount, cat) {
  if (!name || !amount || amount <= 0) return false;
  allExpenses.push({
    id: Date.now().toString() + Math.floor(Math.random() * 1000),
    name: name,
    amount: parseInt(amount),
    cat: cat,
    date: new Date().toISOString()
  });
  save(allExpenses);
  render();
  return true;
}

document.getElementById('addBtn').addEventListener('click', function() {
  var name = document.getElementById('nameInput').value.trim();
  var amount = document.getElementById('amountInput').value;
  var cat = document.getElementById('catInput').value;
  if (addExpense(name, amount, cat)) {
    document.getElementById('nameInput').value = '';
    document.getElementById('amountInput').value = '';
    document.getElementById('nameInput').focus();
  }
});

document.getElementById('nameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});
document.getElementById('amountInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});

document.getElementById('prevMonth').addEventListener('click', function() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  render();
});
document.getElementById('nextMonth').addEventListener('click', function() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  render();
});

document.getElementById('clearAllBtn').addEventListener('click', function() {
  var filtered = getFiltered();
  if (!filtered.length) return;
  if (!confirm((currentMonth + 1) + '月の' + filtered.length + '件を全削除しますか？')) return;
  var ids = {};
  filtered.forEach(function(e) { ids[e.id] = true; });
  allExpenses = allExpenses.filter(function(e) { return !ids[e.id]; });
  save(allExpenses);
  render();
});

document.getElementById('fixedBtn').addEventListener('click', function() {
  var firstDay = new Date(currentYear, currentMonth, 1).toISOString();
  var filtered = getFiltered();
  var alreadyDone = FIXED_EXPENSES.every(function(f) {
    return filtered.some(function(e) { return e.name === f.name && e.amount === f.amount; });
  });
  if (alreadyDone) {
    document.getElementById('fixedHint').textContent = '⚠️ 今月はすでに登録済みです';
    return;
  }
  FIXED_EXPENSES.forEach(function(f) {
    allExpenses.push({
      id: Date.now().toString() + Math.floor(Math.random() * 10000),
      name: f.name,
      amount: f.amount,
      cat: f.cat,
      date: firstDay
    });
  });
  save(allExpenses);
  render();
  var total = FIXED_EXPENSES.reduce(function(s, f) { return s + f.amount; }, 0);
  document.getElementById('fixedHint').textContent = '✅ 固定費 ¥' + total.toLocaleString() + ' を登録しました！';
  setTimeout(function() { document.getElementById('fixedHint').textContent = ''; }, 3000);
});

var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
var voiceBtn = document.getElementById('voiceBtn');
var voiceHint = document.getElementById('voiceHint');

if (SpeechRecognition) {
  var recog = new SpeechRecognition();
  recog.lang = 'ja-JP';
  recog.interimResults = false;
  var recording = false;

  voiceBtn.addEventListener('click', function() {
    if (recording) { recog.stop(); } else { recog.start(); }
  });

  recog.onstart = function() {
    recording = true;
    voiceBtn.classList.add('recording');
    voiceBtn.textContent = '⏹';
    voiceHint.textContent = '🔵 聞いています...（例：「コーヒー 350円」）';
    voiceHint.classList.add('active');
  };

  recog.onend = function() {
    recording = false;
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
    voiceHint.classList.remove('active');
    voiceHint.textContent = '🎤 ボタンで音声入力（例：「コーヒー 350円」）';
  };

  recog.onresult = function(event) {
    var transcript = event.results[0][0].transcript;
    var amountMatch = transcript.match(/(\d[\d,]*)\s*円/);
    var name = transcript.replace(/(\d[\d,]*)\s*円/, '').replace(/[でをのに]/, '').trim();
    if (!name) name = transcript;

    if (amountMatch) {
      var amount = parseInt(amountMatch[1].replace(/,/g, ''));
      document.getElementById('nameInput').value = name || '不明';
      document.getElementById('amountInput').value = amount;

      var catKeywords = {
        'food':      ['ランチ','夕食','朝食','食事','レストラン','弁当','居酒屋','スーパー','コンビニ','ご飯','食料','ラーメン','パン'],
        'cafe':      ['コーヒー','カフェ','喫茶'],
        'transport': ['電車','バス','新幹線','切符','地下鉄','乗車'],
        'taxi':      ['タクシー'],
        'shopping':  ['洋服','服','靴','雑貨','ショッピング','アマゾン'],
        'leisure':   ['映画','ゲーム','本','漫画','音楽','ライブ','趣味','ジム'],
        'medical':   ['薬','病院','クリニック','医療','診察']
      };
      var select = document.getElementById('catInput');
      var matched = false;
      Object.keys(catKeywords).forEach(function(cat) {
        if (matched) return;
        catKeywords[cat].forEach(function(w) {
          if (!matched && (name + transcript).indexOf(w) >= 0) {
            select.value = cat;
            matched = true;
          }
        });
      });
      voiceHint.textContent = '✅ 「' + name + '」¥' + amount.toLocaleString() + ' — 確認して追加！';
    } else {
      document.getElementById('nameInput').value = transcript;
      voiceHint.textContent = '金額が聞き取れませんでした。手動で入力してください。';
    }
  };

  recog.onerror = function(e) {
    voiceHint.textContent = 'エラー: ' + e.error;
    voiceHint.classList.remove('active');
  };
} else {
  voiceBtn.style.opacity = '0.35';
  voiceBtn.title = '音声入力は未対応のブラウザです';
  voiceHint.textContent = '※ このブラウザでは音声入力に対応していません（Chrome推奨）';
}

render();

// 保存ボタン
document.getElementById('saveBtn').addEventListener('click', function() {
  save(allExpenses);
  var hint = document.getElementById('actionHint');
  hint.textContent = '✅ 保存しました！';
  hint.style.color = '#16a34a';
  setTimeout(function() { hint.textContent = ''; }, 2500);
});

// CSVダウンロード
document.getElementById('csvBtn').addEventListener('click', function() {
  var expenses = getFiltered();
  if (expenses.length === 0) {
    var hint = document.getElementById('actionHint');
    hint.textContent = '⚠️ この月の記録がありません';
    hint.style.color = '';
    setTimeout(function() { hint.textContent = ''; }, 2500);
    return;
  }
  var rows = ['\uFEFF日付,内容,カテゴリ,金額'];
  expenses.forEach(function(e) {
    var d = new Date(e.date);
    var dateStr = d.getFullYear() + '/' + ('0'+(d.getMonth()+1)).slice(-2) + '/' + ('0'+d.getDate()).slice(-2);
    var catName = CAT_MAP[e.cat] || e.cat;
    rows.push(dateStr + ',' + e.name + ',' + catName + ',' + e.amount);
  });
  var csv = rows.join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = currentYear + '-' + ('0'+(currentMonth+1)).slice(-2) + '_shuppi.csv';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  var hint = document.getElementById('actionHint');
  hint.textContent = '📥 ダウンロードしました！';
  hint.style.color = '#1a56db';
  setTimeout(function() { hint.textContent = ''; }, 2500);
});

// CSVインポート
document.getElementById('importBtn').addEventListener('click', function() {
  document.getElementById('csvFileInput').click();
});

document.getElementById('csvFileInput').addEventListener('change', function(e) {
  var file = e.target.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(ev) {
    var text = ev.target.result.replace(/^\uFEFF/, ''); // BOM除去
    var lines = text.split('\n').map(function(l) { return l.trim(); }).filter(function(l) { return l; });
    if (lines.length < 2) {
      showActionHint('⚠️ 有効なデータがありません', '');
      return;
    }
    // ヘッダースキップ（1行目）
    var imported = 0;
    var skipped = 0;
    for (var i = 1; i < lines.length; i++) {
      var cols = lines[i].split(',');
      if (cols.length < 4) { skipped++; continue; }
      var dateStr = cols[0].trim();
      var name    = cols[1].trim();
      var catName = cols[2].trim();
      var amount  = parseInt(cols[3].trim());
      if (!name || isNaN(amount)) { skipped++; continue; }
      // カテゴリ名からキーを逆引き
      var cat = 'other';
      Object.keys(CAT_MAP).forEach(function(k) {
        if (CAT_MAP[k] === catName) cat = k;
      });
      // 日付パース
      var d = new Date(dateStr);
      if (isNaN(d.getTime())) d = new Date();
      // 重複チェック（同日・同名・同額）
      var dup = allExpenses.some(function(ex) {
        var ed = new Date(ex.date);
        return ex.name === name && ex.amount === amount &&
          ed.getFullYear() === d.getFullYear() &&
          ed.getMonth() === d.getMonth() &&
          ed.getDate() === d.getDate();
      });
      if (dup) { skipped++; continue; }
      allExpenses.push({
        id: Date.now().toString() + Math.floor(Math.random() * 10000),
        name: name,
        amount: amount,
        cat: cat,
        date: d.toISOString()
      });
      imported++;
    }
    save(allExpenses);
    render();
    showActionHint('✅ ' + imported + '件インポート完了！' + (skipped > 0 ? '（' + skipped + '件スキップ）' : ''), '#16a34a');
    // ファイル入力をリセット
    e.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
});

function showActionHint(msg, color) {
  var hint = document.getElementById('actionHint');
  hint.textContent = msg;
  hint.style.color = color || '#1a56db';
  setTimeout(function() { hint.textContent = ''; }, 3000);
}
</script>
