<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>お買い物リスト</title>

<style>

body{
font-family:sans-serif;
background:#f6f7fb;
margin:0;
padding:20px;
}

.header{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.sub{
color:#666;
margin-bottom:20px;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
padding:8px 14px;
border-radius:10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
}

.add{
padding:12px 18px;
border:none;
border-radius:12px;
background:#ff6b6b;
color:white;
font-size:16px;
}

.item{
background:white;
padding:10px;
border-radius:10px;
margin-bottom:10px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="header">
SHOPPING LIST
</div>

<div class="sub">
お買い物リスト
</div>

<div class="tabs">
<button class="tab">リスト</button>
<button class="tab">テンプレ</button>
</div>

<button class="add" onclick="addItem()">
＋ 商品を追加
</button>

<div id="list"></div>

<script>

let items = JSON.parse(localStorage.getItem("kaimono_items")||"[]")

function save(){
localStorage.setItem("kaimono_items",JSON.stringify(items))
}

function addItem(){

const name = prompt("商品名")

if(!name)return

items.push({
id:Date.now(),
name:name
})

save()
render()

}

function removeItem(id){

items=items.filter(i=>i.id!==id)

save()
render()

}

function render(){

const list=document.getElementById("list")

list.innerHTML=""

items.forEach(i=>{

const div=document.createElement("div")

div.className="item"

div.innerHTML=`
<span>${i.name}</span>
<button onclick="removeItem(${i.id})">削除</button>
`

list.appendChild(div)

})

}

render()

</script>

</body>
</html>
