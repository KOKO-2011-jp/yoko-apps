<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>お買い物リスト</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff6b6b;
    --orange: #ff8e53;
    --yellow: #feca57;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e8edf2;
    --text: #1e293b;
    --muted: #94a3b8;
    --green: #22c55e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); min-height: 100vh; max-width: 480px; margin: 0 auto; }

  /* Header */
  .header {
    background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 50%, #feca57 100%);
    padding: 18px 18px 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(255,107,107,0.3);
  }
  .header-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .header-sub { font-size: 9px; color: rgba(255,255,255,0.85); font-weight: 900; letter-spacing: 3px; font-family: 'Nunito', sans-serif; }
  .header-title { font-size: 24px; font-weight: 900; color: #fff; font-family: 'Nunito', sans-serif; line-height: 1.1; }
  .header-actions { display: flex; gap: 6px; align-items: center; }
  .header-btn { background: rgba(255,255,255,0.22); color: #fff; border: none; border-radius: 14px; padding: 5px 11px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; display: none; white-space: nowrap; }
  .header-btn:active { transform: scale(0.95); }
  .header-meta { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  .badge { background: rgba(255,255,255,0.25); color: #fff; border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 700; display: none; }
  .total-badge { background: rgba(255,255,255,0.9); color: var(--red); border-radius: 20px; padding: 4px 12px; font-size: 12px; font-weight: 800; display: none; font-family: 'Nunito', sans-serif; }

  /* Tabs */
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); position: sticky; top: 82px; z-index: 99; }
  .tab { flex: 1; padding: 12px; text-align: center; font-weight: 700; font-size: 13px; color: var(--muted); border: none; background: none; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
  .tab.active { color: var(--red); border-bottom-color: var(--red); }

  /* Toolbar */
  .toolbar { display: flex; align-items: center; gap: 6px; padding: 10px 14px 0; flex-wrap: wrap; }
  .sort-btn { background: var(--card); border: 1.5px solid var(--border); border-radius: 10px; padding: 5px 11px; font-size: 12px; font-weight: 700; color: var(--muted); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; transition: all 0.15s; }
  .sort-btn.active { background: #fff0ee; border-color: #fca5a5; color: var(--red); }
  .clear-checked-btn { margin-left: auto; background: #fff0f0; border: 1.5px solid #fca5a5; border-radius: 10px; padding: 5px 11px; font-size: 12px; font-weight: 700; color: var(--red); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; display: none; transition: all 0.15s; }
  .clear-checked-btn:active { transform: scale(0.95); }

  /* Content */
  .content { padding: 12px 14px; padding-bottom: 40px; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Add button */
  .add-btn { width: 100%; padding: 13px; border: 2.5px dashed #fcb69f; border-radius: 18px; background: #fff9f5; color: var(--orange); font-weight: 700; font-size: 15px; cursor: pointer; margin-bottom: 12px; font-family: 'Noto Sans JP', sans-serif; transition: all 0.2s; }
  .add-btn:active { transform: scale(0.98); }

  /* Add form */
  .add-form { background: #fff5f5; border: 2px solid #fecaca; border-radius: 20px; padding: 14px; margin-bottom: 12px; display: none; position: relative; }
  .add-form.show { display: block; animation: slideDown 0.2s ease; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .form-title { font-size: 13px; font-weight: 700; color: var(--red); margin-bottom: 10px; }

  .input-row { display: flex; gap: 6px; margin-bottom: 8px; position: relative; }
  .form-input { flex: 1; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; font-size: 15px; outline: none; font-family: 'Noto Sans JP', sans-serif; transition: border-color 0.2s; background: #fff; }
  .form-input:focus { border-color: #fca5a5; }
  .mic-btn { width: 44px; height: 44px; border-radius: 12px; border: 2px solid #e2e8f0; background: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .mic-btn.listening { background: #fee2e2; border-color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

  /* Suggestions */
  .suggestions { background: #fff; border: 2px solid #fca5a5; border-radius: 12px; margin-bottom: 8px; overflow: hidden; display: none; }
  .suggestions.show { display: block; animation: slideDown 0.15s ease; }
  .suggest-item { padding: 9px 14px; font-size: 14px; font-weight: 700; color: var(--text); cursor: pointer; border-bottom: 1px solid #fef2f2; transition: background 0.1s; }
  .suggest-item:last-child { border-bottom: none; }
  .suggest-item:active { background: #fff0f0; }

  .form-row2 { display: flex; gap: 8px; margin-bottom: 8px; }
  .form-select { flex: 1; border: 2px solid #e2e8f0; border-radius: 12px; padding: 9px 10px; font-size: 13px; outline: none; background: #fff; font-family: 'Noto Sans JP', sans-serif; }
  .price-input-wrap { display: flex; align-items: center; flex: 1; background: #fff; border: 2px solid #e2e8f0; border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
  .price-input-wrap:focus-within { border-color: #fca5a5; }
  .price-input { flex: 1; border: none; outline: none; padding: 9px 6px 9px 12px; font-size: 14px; font-weight: 700; font-family: 'Nunito', sans-serif; width: 0; min-width: 0; }
  .price-unit { padding: 9px 10px 9px 2px; font-size: 13px; color: var(--muted); font-weight: 700; flex-shrink: 0; }

  .qty-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .qty-label { font-size: 13px; font-weight: 700; color: #334155; }
  .qty-ctrl { display: flex; align-items: center; background: #f8fafc; border-radius: 12px; padding: 3px; gap: 2px; }
  .qty-btn { width: 34px; height: 34px; border: none; background: none; font-size: 20px; color: #64748b; cursor: pointer; border-radius: 8px; font-weight: 600; }
  .qty-btn:active { background: #e2e8f0; }
  .qty-num { font-size: 17px; font-weight: 900; min-width: 30px; text-align: center; color: var(--text); font-family: 'Nunito', sans-serif; }
  .form-btns { display: flex; gap: 8px; }
  .cancel-btn { flex: 1; padding: 10px; border-radius: 13px; border: 2px solid #e2e8f0; background: #fff; color: var(--muted); font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .confirm-btn { flex: 2; padding: 10px; border-radius: 13px; border: none; background: linear-gradient(135deg, var(--red), var(--orange)); color: #fff; font-weight: 800; font-size: 15px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .confirm-btn:active { transform: scale(0.98); }

  /* Empty */
  .empty { text-align: center; padding: 50px 0; color: #cbd5e1; }
  .empty-emoji { font-size: 44px; margin-bottom: 10px; }
  .empty-text { font-size: 15px; font-weight: 700; }
  .empty-sub { font-size: 12px; margin-top: 4px; }

  /* Category label */
  .cat-label { font-size: 11px; font-weight: 900; letter-spacing: 1px; margin-bottom: 5px; margin-top: 6px; padding-left: 2px; }

  /* Item row */
  .item-row { display: flex; align-items: center; gap: 9px; border: 2px solid; border-radius: 15px; padding: 10px 11px; margin-bottom: 6px; transition: all 0.2s; }
  .item-row.checked { opacity: 0.55; background: #f8fafc !important; border-color: #e2e8f0 !important; }
  .checkbox { width: 26px; height: 26px; border-radius: 50%; border: 2.5px solid; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; font-size: 13px; color: #fff; }
  .item-main { flex: 1; min-width: 0; }
  .item-name { font-size: 15px; font-weight: 700; color: var(--text); transition: all 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-row.checked .item-name { text-decoration: line-through; color: var(--muted); }
  .item-price { font-size: 11px; font-weight: 700; color: var(--muted); margin-top: 1px; font-family: 'Nunito', sans-serif; }
  .qty-badge { border-radius: 9px; padding: 2px 9px; font-size: 13px; font-weight: 700; flex-shrink: 0; font-family: 'Nunito', sans-serif; }
  .delete-btn { background: none; border: none; color: #cbd5e1; font-size: 15px; cursor: pointer; padding: 4px; flex-shrink: 0; }
  .delete-btn:active { color: var(--red); }

  /* Save template btn */
  .save-tpl-btn { width: 100%; padding: 12px; border-radius: 18px; border: none; background: #e0f2fe; color: #1e40af; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 8px; font-family: 'Noto Sans JP', sans-serif; }

  /* Template card */
  .tpl-card { border-radius: 18px; padding: 16px; margin-bottom: 12px; animation: slideDown 0.2s ease; }
  .tpl-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .tpl-name { font-size: 17px; font-weight: 900; color: var(--text); }
  .tpl-del-btn { background: rgba(255,255,255,0.5); border: none; border-radius: 8px; padding: 4px 10px; font-size: 12px; color: #64748b; font-weight: 700; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
  .tpl-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .tpl-tag { background: rgba(255,255,255,0.65); border-radius: 7px; padding: 2px 8px; font-size: 12px; font-weight: 700; color: #334155; }
  .load-btn { width: 100%; padding: 10px; border-radius: 13px; border: none; background: rgba(255,255,255,0.8); font-weight: 700; font-size: 14px; color: var(--text); cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.show { display: flex; animation: fadeIn 0.15s ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal { background: #fff; border-radius: 24px 24px 0 0; padding: 26px 22px 38px; width: 100%; animation: slideUp 0.2s ease; }
  @keyframes slideUp { from { transform: translateY(20px); } to { transform: translateY(0); } }
  .modal-title { font-size: 17px; font-weight: 900; color: var(--text); margin-bottom: 4px; }
  .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 14px; }

  /* Toast */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1e293b; color: #fff; padding: 10px 20px; border-radius: 40px; font-size: 13px; font-weight: 700; z-index: 300; transition: transform 0.25s ease, opacity 0.25s ease; opacity: 0; white-space: nowrap; font-family: 'Noto Sans JP', sans-serif; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Receipt scan button in templates tab */
  .receipt-scan-btn { width: 100%; padding: 16px; border-radius: 18px; border: 2.5px dashed #f9a8d4; background: linear-gradient(135deg, #fff0f9, #fff5f5); color: #db2777; font-weight: 700; font-size: 15px; cursor: pointer; margin-bottom: 16px; font-family: 'Noto Sans JP', sans-serif; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
  .receipt-scan-btn:active { transform: scale(0.98); }

  /* Receipt modal */
  .receipt-modal { background: #fff; border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; animation: slideUp 0.2s ease; max-height: 90vh; overflow-y: auto; }
  .receipt-preview { width: 100%; border-radius: 14px; margin: 10px 0; max-height: 220px; object-fit: contain; background: #f8fafc; display: none; }
  .receipt-preview.show { display: block; }
  .receipt-drop { border: 2.5px dashed #fca5a5; border-radius: 16px; padding: 32px 20px; text-align: center; color: #94a3b8; font-weight: 700; font-size: 14px; cursor: pointer; background: #fff9f9; margin: 10px 0; transition: all 0.2s; }
  .receipt-drop:active { background: #fff0f0; }
  .receipt-drop-icon { font-size: 36px; margin-bottom: 8px; }
  .receipt-result { margin-top: 12px; display: none; }
  .receipt-result.show { display: block; animation: slideDown 0.2s ease; }
  .result-item-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 12px; background: #f8fafc; margin-bottom: 6px; border: 1.5px solid #e2e8f0; }
  .result-item-name { flex: 1; font-size: 14px; font-weight: 700; color: #1e293b; }
  .result-item-price { font-size: 13px; font-weight: 700; color: #64748b; font-family: 'Nunito', sans-serif; white-space: nowrap; }
  .result-item-cat { font-size: 11px; color: #94a3b8; font-weight: 700; }
  .result-check { width: 20px; height: 20px; accent-color: #ff6b6b; cursor: pointer; flex-shrink: 0; }
  .scanning-anim { text-align: center; padding: 24px; color: #94a3b8; font-weight: 700; font-size: 14px; }
  .scan-spinner { font-size: 32px; animation: spin 1s linear infinite; display: inline-block; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .result-actions { display: flex; gap: 8px; margin-top: 12px; }
  .tpl-name-input { width: 100%; border: 2px solid #e2e8f0; border-radius: 12px; padding: 10px 14px; font-size: 15px; outline: none; font-family: 'Noto Sans JP', sans-serif; margin-bottom: 10px; }
  .tpl-name-input:focus { border-color: #fca5a5; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <div>
      <div class="header-sub">SHOPPING</div>
      <div class="header-title">お買い物リスト 🛍️</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="shareBtn" onclick="shareList()">📤 共有</button>
    </div>
  </div>
  <div class="header-meta">
    <div class="badge" id="badge"></div>
    <div class="total-badge" id="totalBadge"></div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('list')">🛒 リスト</button>
  <button class="tab" onclick="switchTab('templates')">📋 テンプレ</button>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar" style="display:none">
  <button class="sort-btn active" id="sortCat" onclick="setSort('cat')">📂 カテゴリ順</button>
  <button class="sort-btn" id="sortAdd" onclick="setSort('add')">🕐 追加順</button>
  <button class="clear-checked-btn" id="clearCheckedBtn" onclick="clearChecked()">✅ 済みを削除</button>
</div>

<!-- Content -->
<div class="content">

  <!-- List Tab -->
  <div class="tab-panel active" id="tab-list">
    <div class="add-form" id="addForm">
      <div class="form-title">＋ 商品を追加</div>
      <div class="input-row">
        <input class="form-input" id="newName" placeholder="商品名を入力..." autocomplete="off"
          oninput="onNameInput()" onkeydown="onNameKey(event)">
        <button class="mic-btn" id="micBtn" onclick="toggleMic()" title="音声入力">🎤</button>
      </div>
      <div class="suggestions" id="suggestions"></div>
      <div class="form-row2">
        <select class="form-select" id="newCategory">
          <option>野菜・果物</option>
          <option>肉・魚</option>
          <option>乳製品</option>
          <option>パン・穀物</option>
          <option>飲み物</option>
          <option>日用品</option>
          <option selected>その他</option>
        </select>
        <div class="price-input-wrap">
          <input class="price-input" id="newPrice" type="number" placeholder="値段" min="0">
          <span class="price-unit">円</span>
        </div>
      </div>
      <div class="qty-row">
        <span class="qty-label">数量</span>
        <div class="qty-ctrl">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-num" id="qtyNum">1</span>
          <button class="qty-btn" onclick="changeQty(1)">＋</button>
        </div>
      </div>
      <div class="form-btns">
        <button class="cancel-btn" onclick="closeForm()">キャンセル</button>
        <button class="confirm-btn" onclick="addItem()">追加する</button>
      </div>
    </div>
    <button class="add-btn" id="addBtn" onclick="openForm()">＋ 商品を追加する</button>
    <div id="itemList"></div>
    <button class="save-tpl-btn" id="saveTplBtn" style="display:none" onclick="openTplModal()">📋 このリストをテンプレとして保存</button>
  </div>

  <!-- Templates Tab -->
  <div class="tab-panel" id="tab-templates">
    <button class="receipt-scan-btn" onclick="openReceiptModal()">
      📸 レシートを読み取ってテンプレ作成
    </button>
    <div id="templateList"></div>
  </div>
</div>

<!-- Template Save Modal -->
<div class="modal-overlay" id="tplModal" onclick="if(event.target===this)closeTplModal()">
  <div class="modal">
    <div class="modal-title">📋 テンプレートとして保存</div>
    <div class="modal-sub">テンプレート名をつけてください</div>
    <input class="form-input" id="tplName" placeholder="例：週末まとめ買い" onkeydown="if(event.key==='Enter')saveTemplate()">
    <div class="form-btns" style="margin-top:10px">
      <button class="cancel-btn" onclick="closeTplModal()">キャンセル</button>
      <button class="confirm-btn" style="background:linear-gradient(135deg,#a1c4fd,#6366f1)" onclick="saveTemplate()">保存する</button>
    </div>
  </div>
</div>

<!-- Receipt Scan Modal -->
<div class="modal-overlay" id="receiptModal" onclick="if(event.target===this)closeReceiptModal()">
  <div class="receipt-modal">
    <div class="modal-title">📸 レシート読み取り</div>
    <div class="modal-sub" id="receiptModalSub">写真を選んでAIが商品を自動認識します</div>

    <div id="receiptUploadArea">
      <div class="receipt-drop" onclick="document.getElementById('receiptInput').click()">
        <div class="receipt-drop-icon">🧾</div>
        <div>タップして写真を選択</div>
        <div style="font-size:12px;margin-top:4px;font-weight:400">レシート・メモ・チラシ OK</div>
      </div>
      <input type="file" id="receiptInput" accept="image/*" capture="environment" style="display:none" onchange="onReceiptSelected(event)">
      <img class="receipt-preview" id="receiptPreview">
    </div>

    <div id="receiptScanning" style="display:none">
      <div class="scanning-anim">
        <div class="scan-spinner">🔍</div>
        <div>AIが読み取り中…</div>
      </div>
    </div>

    <div class="receipt-result" id="receiptResult">
      <div style="font-size:13px;font-weight:700;color:#64748b;margin-bottom:8px">✅ 追加する商品を選んでください</div>
      <div id="resultItemList"></div>
      <input class="tpl-name-input" id="receiptTplName" placeholder="テンプレート名（例：いつもの買い物）">
      <div class="result-actions">
        <button class="cancel-btn" onclick="resetReceiptModal()">やり直す</button>
        <button class="confirm-btn" onclick="saveReceiptAsTemplate()">テンプレに保存</button>
      </div>
      <button style="width:100%;margin-top:8px;padding:10px;border-radius:13px;border:none;background:#f0fdf4;color:#16a34a;font-weight:700;font-size:14px;cursor:pointer;font-family:'Noto Sans JP',sans-serif" onclick="addReceiptToList()">＋ 今すぐリストに追加</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const CATS = {
  "野菜・果物": { emoji:"🥦", color:"#16a34a", bg:"#f0fdf4", border:"#86efac" },
  "肉・魚":     { emoji:"🥩", color:"#dc2626", bg:"#fef2f2", border:"#fca5a5" },
  "乳製品":     { emoji:"🧀", color:"#d97706", bg:"#fffbeb", border:"#fde68a" },
  "パン・穀物": { emoji:"🍞", color:"#ea580c", bg:"#fff7ed", border:"#fdba74" },
  "飲み物":     { emoji:"🧃", color:"#2563eb", bg:"#eff6ff", border:"#93c5fd" },
  "日用品":     { emoji:"🧴", color:"#7c3aed", bg:"#f5f3ff", border:"#c4b5fd" },
  "その他":     { emoji:"🛒", color:"#64748b", bg:"#f8fafc", border:"#cbd5e1" },
};
const TPL_COLORS = ["#fcb69f","#a1c4fd","#96e6a1","#f5a7c7","#a5d8ff"];
const SAMPLE_TEMPLATES = [
  { id:1, name:"週末まとめ買い", color:"#fcb69f", items:[
    {name:"牛乳",category:"乳製品",qty:2,price:200},
    {name:"食パン",category:"パン・穀物",qty:1,price:150},
    {name:"卵",category:"乳製品",qty:1,price:250},
    {name:"鶏むね肉",category:"肉・魚",qty:2,price:300},
    {name:"トマト",category:"野菜・果物",qty:3,price:0},
  ]},
  { id:2, name:"朝食セット", color:"#a1c4fd", items:[
    {name:"ヨーグルト",category:"乳製品",qty:1,price:180},
    {name:"バナナ",category:"野菜・果物",qty:4,price:0},
    {name:"オレンジジュース",category:"飲み物",qty:1,price:250},
  ]},
];

let items = JSON.parse(localStorage.getItem('kaimono_items') || '[]');
let templates = JSON.parse(localStorage.getItem('kaimono_templates') || JSON.stringify(SAMPLE_TEMPLATES));
let history = JSON.parse(localStorage.getItem('kaimono_history') || '[]'); // purchase history for suggestions
let qty = 1;
let activeTab = 'list';
let sortMode = 'cat'; // 'cat' or 'add'
let recognition = null;
let isListening = false;

function save() {
  localStorage.setItem('kaimono_items', JSON.stringify(items));
  localStorage.setItem('kaimono_templates', JSON.stringify(templates));
  localStorage.setItem('kaimono_history', JSON.stringify(history));
}

// Toast
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// Tab
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='list')||(i===1&&tab==='templates')));
  document.getElementById('tab-list').classList.toggle('active', tab==='list');
  document.getElementById('tab-templates').classList.toggle('active', tab==='templates');
  render();
}

// Sort
function setSort(mode) {
  sortMode = mode;
  document.getElementById('sortCat').classList.toggle('active', mode==='cat');
  document.getElementById('sortAdd').classList.toggle('active', mode==='add');
  render();
}

// Form
function openForm() {
  document.getElementById('addForm').classList.add('show');
  document.getElementById('addBtn').style.display = 'none';
  document.getElementById('newName').focus();
  qty = 1;
  document.getElementById('qtyNum').textContent = 1;
}
function closeForm() {
  document.getElementById('addForm').classList.remove('show');
  document.getElementById('addBtn').style.display = 'block';
  document.getElementById('newName').value = '';
  document.getElementById('newCategory').value = 'その他';
  document.getElementById('newPrice').value = '';
  document.getElementById('suggestions').classList.remove('show');
  qty = 1;
  document.getElementById('qtyNum').textContent = 1;
  stopMic();
}
function changeQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qtyNum').textContent = qty;
}

// Suggestions
function onNameInput() {
  const val = document.getElementById('newName').value.trim();
  const sug = document.getElementById('suggestions');
  if (!val) { sug.classList.remove('show'); return; }
  const matches = history.filter(h => h.startsWith(val) && h !== val).slice(0, 5);
  if (!matches.length) { sug.classList.remove('show'); return; }
  sug.innerHTML = matches.map(m => `<div class="suggest-item" onclick="pickSuggest('${m.replace(/'/g,"\\'")}')">🔍 ${m}</div>`).join('');
  sug.classList.add('show');
}
function onNameKey(e) {
  if (e.key === 'Enter') addItem();
}
function pickSuggest(name) {
  document.getElementById('newName').value = name;
  document.getElementById('suggestions').classList.remove('show');
}

// Items
function addItem() {
  const name = document.getElementById('newName').value.trim();
  if (!name) return;
  const category = document.getElementById('newCategory').value;
  const price = parseInt(document.getElementById('newPrice').value) || 0;
  items.push({ id: Date.now(), name, category, qty, price, checked: false, addedAt: Date.now() });
  // save to history
  if (!history.includes(name)) { history.unshift(name); if (history.length > 50) history.pop(); }
  save(); closeForm(); render();
  showToast('✅ ' + name + ' を追加しました');
}
function toggleItem(id) {
  const item = items.find(i => i.id === id);
  if (item) { item.checked = !item.checked; save(); render(); }
}
function removeItem(id) {
  items = items.filter(i => i.id !== id); save(); render();
}
function clearChecked() {
  const count = items.filter(i => i.checked).length;
  if (!count) return;
  items = items.filter(i => !i.checked);
  save(); render();
  showToast('🗑️ チェック済みを ' + count + ' 件削除しました');
}

// Voice input
function toggleMic() {
  if (isListening) { stopMic(); return; }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) { showToast('⚠️ このブラウザは音声入力非対応です'); return; }
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => {
    isListening = true;
    document.getElementById('micBtn').classList.add('listening');
    document.getElementById('micBtn').textContent = '🔴';
  };
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('newName').value = text;
    onNameInput();
    stopMic();
  };
  recognition.onerror = () => { stopMic(); showToast('⚠️ 音声認識エラー'); };
  recognition.onend = () => stopMic();
  recognition.start();
}
function stopMic() {
  isListening = false;
  document.getElementById('micBtn').classList.remove('listening');
  document.getElementById('micBtn').textContent = '🎤';
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
}

// Templates
function openTplModal() { document.getElementById('tplModal').classList.add('show'); document.getElementById('tplName').value = ''; setTimeout(()=>document.getElementById('tplName').focus(),100); }
function closeTplModal() { document.getElementById('tplModal').classList.remove('show'); }
function saveTemplate() {
  const name = document.getElementById('tplName').value.trim();
  if (!name) return;
  templates.push({ id: Date.now(), name, color: TPL_COLORS[templates.length % TPL_COLORS.length], items: items.map(({name,category,qty,price})=>({name,category,qty,price})) });
  save(); closeTplModal(); render();
  showToast('📋 テンプレートを保存しました');
}
function loadTemplate(id) {
  const tpl = templates.find(t => t.id === id);
  if (!tpl) return;
  tpl.items.forEach(item => items.push({...item, id: Date.now()+Math.random(), checked: false, addedAt: Date.now()}));
  save(); switchTab('list');
  showToast('📥 テンプレートを読み込みました');
}
function deleteTemplate(id) {
  templates = templates.filter(t => t.id !== id); save(); render();
  showToast('🗑️ テンプレートを削除しました');
}

// Share
function shareList() {
  if (items.length === 0) { showToast('⚠️ リストが空です'); return; }
  const sorted = getSortedItems();
  let text = '🛍️ お買い物リスト\n\n';
  if (sortMode === 'cat') {
    Object.keys(CATS).forEach(cat => {
      const ci = sorted.filter(i=>i.category===cat);
      if (!ci.length) return;
      text += CATS[cat].emoji + ' ' + cat + '\n';
      ci.forEach(item => {
        text += '  ' + (item.checked?'✅':'⬜') + ' ' + item.name + '　×' + item.qty;
        if (item.price) text += '（' + (item.price * item.qty).toLocaleString() + '円）';
        text += '\n';
      });
      text += '\n';
    });
  } else {
    sorted.forEach(item => {
      text += (item.checked?'✅':'⬜') + ' ' + item.name + '　×' + item.qty;
      if (item.price) text += '（' + (item.price * item.qty).toLocaleString() + '円）';
      text += '\n';
    });
  }
  const checked = items.filter(i=>i.checked).length;
  const total = calcTotal();
  text += `\n（${checked}/${items.length} 完了）`;
  if (total > 0) text += `\n合計 ¥${total.toLocaleString()}`;
  if (navigator.share) navigator.share({ text });
  else navigator.clipboard.writeText(text).then(()=>showToast('📋 コピーしました！'));
}

function calcTotal() {
  return items.filter(i=>!i.checked).reduce((s,i)=>s+(i.price||0)*i.qty, 0);
}
function calcGrandTotal() {
  return items.reduce((s,i)=>s+(i.price||0)*i.qty, 0);
}

function getSortedItems() {
  if (sortMode === 'add') return [...items];
  return [...items].sort((a,b) => {
    const keys = Object.keys(CATS);
    return keys.indexOf(a.category) - keys.indexOf(b.category);
  });
}

// Render
function render() {
  const checked = items.filter(i=>i.checked).length;
  const hasItems = items.length > 0;
  const hasChecked = checked > 0;
  const total = calcGrandTotal();
  const remaining = calcTotal();

  document.getElementById('badge').style.display = hasItems ? 'block' : 'none';
  document.getElementById('badge').textContent = checked + ' / ' + items.length + ' 完了 ✨';
  document.getElementById('shareBtn').style.display = hasItems ? 'block' : 'none';
  document.getElementById('saveTplBtn').style.display = hasItems ? 'block' : 'none';
  document.getElementById('toolbar').style.display = hasItems ? 'flex' : 'none';
  document.getElementById('clearCheckedBtn').style.display = hasChecked ? 'block' : 'none';

  const totalBadge = document.getElementById('totalBadge');
  if (total > 0) {
    totalBadge.style.display = 'block';
    totalBadge.textContent = remaining > 0 ? '¥' + remaining.toLocaleString() + ' (残)' : '全部チェック済！';
  } else {
    totalBadge.style.display = 'none';
  }

  // Items
  const listEl = document.getElementById('itemList');
  if (!hasItems) {
    listEl.innerHTML = '<div class="empty"><div class="empty-emoji">🛒</div><div class="empty-text">リストが空です</div><div class="empty-sub">商品を追加してみましょう！</div></div>';
  } else {
    const sorted = getSortedItems();
    let html = '';
    if (sortMode === 'cat') {
      Object.keys(CATS).forEach(cat => {
        const catItems = sorted.filter(i => i.category === cat);
        if (!catItems.length) return;
        const cfg = CATS[cat];
        html += `<div class="cat-label" style="color:${cfg.color}">${cfg.emoji} ${cat}</div>`;
        catItems.forEach(item => html += renderItem(item, cfg));
      });
    } else {
      sorted.forEach(item => {
        const cfg = CATS[item.category] || CATS['その他'];
        html += renderItem(item, cfg);
      });
    }
    listEl.innerHTML = html;
  }

  // Templates
  const tplEl = document.getElementById('templateList');
  if (!templates.length) {
    tplEl.innerHTML = '<div class="empty"><div class="empty-emoji">📋</div><div class="empty-text">テンプレートがありません</div><div class="empty-sub">リストを保存してみましょう！</div></div>';
  } else {
    tplEl.innerHTML = templates.map(tpl => `
      <div class="tpl-card" style="background:${tpl.color}">
        <div class="tpl-header">
          <span class="tpl-name">${tpl.name}</span>
          <button class="tpl-del-btn" onclick="deleteTemplate(${tpl.id})">削除</button>
        </div>
        <div class="tpl-tags">${tpl.items.map(i=>`<span class="tpl-tag">${i.name}×${i.qty}</span>`).join('')}</div>
        <button class="load-btn" onclick="loadTemplate(${tpl.id})">📥 このテンプレを読み込む</button>
      </div>`).join('');
  }
}

function renderItem(item, cfg) {
  const bg = item.checked ? '#f8fafc' : cfg.bg;
  const border = item.checked ? '#e2e8f0' : cfg.border;
  const cbBg = item.checked ? cfg.color : 'transparent';
  const qBg = item.checked ? '#e2e8f0' : cfg.border;
  const qColor = item.checked ? '#94a3b8' : cfg.color;
  const priceText = item.price ? `<div class="item-price">¥${(item.price*item.qty).toLocaleString()}${item.qty>1?' (×'+item.qty+')':''}</div>` : '';
  return `
    <div class="item-row ${item.checked?'checked':''}" style="background:${bg};border-color:${border}">
      <button class="checkbox" style="border-color:${item.checked?cfg.color:cfg.border};background:${cbBg}" onclick="toggleItem(${item.id})">${item.checked?'✓':''}</button>
      <div class="item-main">
        <div class="item-name">${item.name}</div>
        ${priceText}
      </div>
      <span class="qty-badge" style="background:${qBg};color:${qColor}">×${item.qty}</span>
      <button class="delete-btn" onclick="removeItem(${item.id})">✕</button>
    </div>`;
}

render();

// ── Receipt Scan ──────────────────────────────────────
let receiptItems = [];

function openReceiptModal() {
  document.getElementById('receiptModal').classList.add('show');
  resetReceiptModal();
}
function closeReceiptModal() {
  document.getElementById('receiptModal').classList.remove('show');
}
function resetReceiptModal() {
  receiptItems = [];
  document.getElementById('receiptUploadArea').style.display = 'block';
  document.getElementById('receiptScanning').style.display = 'none';
  document.getElementById('receiptResult').classList.remove('show');
  document.getElementById('receiptPreview').classList.remove('show');
  document.getElementById('receiptPreview').src = '';
  document.getElementById('receiptInput').value = '';
  document.getElementById('receiptTplName').value = '';
  document.getElementById('receiptModalSub').textContent = '写真を選んでAIが商品を自動認識します';
}

async function onReceiptSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const base64 = ev.target.result.split(',')[1];
    const mediaType = file.type || 'image/jpeg';
    const preview = document.getElementById('receiptPreview');
    preview.src = ev.target.result;
    preview.classList.add('show');
    document.getElementById('receiptUploadArea').style.display = 'none';
    document.getElementById('receiptScanning').style.display = 'block';
    document.getElementById('receiptResult').classList.remove('show');
    try {
      const result = await callClaudeWithReceipt(base64, mediaType);
      receiptItems = result;
      renderReceiptResult(result);
    } catch(err) {
      document.getElementById('receiptScanning').style.display = 'none';
      document.getElementById('receiptUploadArea').style.display = 'block';
      preview.classList.remove('show');
      showToast('⚠️ 読み取りに失敗しました。もう一度お試しください');
    }
  };
  reader.readAsDataURL(file);
}

async function callClaudeWithReceipt(base64, mediaType) {
  const catList = Object.keys(CATS).join('、');
  const prompt = `このレシートまたは画像から買い物リストに使える商品情報を抽出してください。

以下のJSON形式のみで返答してください（説明文や\`\`\`は不要です）:
{"templateName":"テンプレート名の提案","items":[{"name":"商品名","qty":数量整数,"price":単価整数(不明は0),"category":"カテゴリ"}]}

カテゴリは必ずこの中から選択: ${catList}
商品が読み取れない場合はitemsを空配列にしてください。`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: [
        { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
        { type: 'text', text: prompt }
      ]}]
    })
  });
  if (!response.ok) throw new Error('API error ' + response.status);
  const data = await response.json();
  const text = data.content.map(c => c.text || '').join('').trim().replace(/```json|```/g, '').trim();
  const parsed = JSON.parse(text);
  if (parsed.templateName) document.getElementById('receiptTplName').value = parsed.templateName;
  return parsed.items || [];
}

function renderReceiptResult(resultItems) {
  document.getElementById('receiptScanning').style.display = 'none';
  if (!resultItems.length) {
    document.getElementById('receiptUploadArea').style.display = 'block';
    document.getElementById('receiptPreview').classList.remove('show');
    showToast('⚠️ 商品が認識できませんでした');
    return;
  }
  document.getElementById('receiptModalSub').textContent = resultItems.length + '件の商品を認識しました';
  const listEl = document.getElementById('resultItemList');
  listEl.innerHTML = resultItems.map((item, i) => {
    const cfg = CATS[item.category] || CATS['その他'];
    return `<div class="result-item-row">
      <input type="checkbox" class="result-check" id="rc${i}" checked>
      <div style="flex:1;min-width:0">
        <div class="result-item-name">${item.name}</div>
        <div class="result-item-cat">${cfg.emoji} ${item.category}　×${item.qty}</div>
      </div>
      ${item.price ? `<div class="result-item-price">¥${item.price.toLocaleString()}</div>` : ''}
    </div>`;
  }).join('');
  document.getElementById('receiptResult').classList.add('show');
}

function getCheckedReceiptItems() {
  return receiptItems.filter((_, i) => { const cb = document.getElementById('rc'+i); return cb && cb.checked; });
}
function saveReceiptAsTemplate() {
  const selected = getCheckedReceiptItems();
  if (!selected.length) { showToast('⚠️ 商品を1つ以上選んでください'); return; }
  const name = document.getElementById('receiptTplName').value.trim() || 'レシートから作成';
  templates.push({ id: Date.now(), name, color: TPL_COLORS[templates.length % TPL_COLORS.length], items: selected.map(({name,category,qty,price})=>({name,category,qty,price:price||0})) });
  save(); closeReceiptModal(); switchTab('templates');
  showToast('📋 テンプレートを保存しました！');
}
function addReceiptToList() {
  const selected = getCheckedReceiptItems();
  if (!selected.length) { showToast('⚠️ 商品を1つ以上選んでください'); return; }
  selected.forEach(item => items.push({...item, id:Date.now()+Math.random(), price:item.price||0, checked:false, addedAt:Date.now()}));
  save(); closeReceiptModal(); switchTab('list');
  showToast('✅ ' + selected.length + '件をリストに追加しました！');
}
</script>
